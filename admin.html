<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Master Admin | Tesla Base</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        .box { border: 1px solid #E31937; border-radius: 12px; padding: 20px; margin-bottom: 20px; background: #111; }
        h2 { font-size: 14px; color: #E31937; margin-bottom: 15px; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; text-align: left; }
        th, td { padding: 12px; border-bottom: 1px solid #222; }
        input { width: 100%; padding: 12px; border-radius: 6px; border:none; margin: 10px 0; box-sizing:border-box; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { padding: 12px; border:none; border-radius:6px; font-weight:bold; cursor:pointer; color:#fff; }
    </style>
</head>
<body>

    <h1 style="color:#E31937;">MASTER CONTROL</h1>

    <div class="box">
        <h2>User Credentials & Balances</h2>
        <table>
            <tr><th>Email</th><th>Password</th><th>Balance</th></tr>
            <tr><td>sweetcsf1@gmail.com</td><td>222222</td><td id="a-bal" style="color:#28a745; font-weight:bold;">$0.00</td></tr>
        </table>
    </div>

    <div class="box">
        <h2>Financial Injection</h2>
        <input type="number" id="a-amt" placeholder="Amount (USD)">
        <div class="btn-grid">
            <button class="btn" style="background:#28a745" onclick="mod('add')">Inject Deposit</button>
            <button class="btn" style="background:#ffc107; color:#000" onclick="mod('add')">Inject Interest</button>
            <button class="btn" style="background:#007bff" onclick="mod('add')">Inject Return</button>
            <button class="btn" style="background:#6c757d" onclick="mod('sub')">Deduct Funds</button>
        </div>
    </div>

    <div class="box">
        <h2>Support Inbox (Images)</h2>
        <table>
            <tr><th>User</th><th>Message</th><th>Action</th></tr>
            <tr><td>sweetcsf1@gmail.com</td><td>Deposit Proof</td><td><a href="#" style="color:#007bff">View Screenshot</a></td></tr>
        </table>
    </div>

    <div class="box">
        <h2>Global Wallet Setup</h2>
        <input type="text" id="a-wall" placeholder="Bitcoin Wallet Address">
        <button class="btn" style="background:#007bff; width:100%" onclick="saveW()">Update All Users</button>
    </div>

    <script>
        function mod(t) {
            const v = parseFloat(document.getElementById('a-amt').value);
            if(isNaN(v)) return;
            let c = parseFloat(localStorage.getItem('userBalance')) || 0;
            if(t === 'sub') c -= v; else c += v;
            localStorage.setItem('userBalance', c.toFixed(2));
            render();
            alert("Funds Updated!");
        }
        function saveW() {
            localStorage.setItem('dep_info', document.getElementById('a-wall').value);
            alert("Wallet updated successfully!");
        }
        function render() {
            const b = localStorage.getItem('userBalance') || "0.00";
            document.getElementById('a-bal').innerText = "$" + parseFloat(b).toLocaleString();
        }
        window.onload = render;
    </script>
</body>
</html>
