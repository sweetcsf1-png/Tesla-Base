<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tesla Base | Master Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #000;
            --tesla-red: #E31937;
            --card-bg: #121212;
            --text-main: #ffffff;
            --text-gray: #888888;
            --border: #222222;
            --success: #00ff88;
            --danger: #ff3b3b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, sans-serif;
            margin: 0;
            padding-bottom: 90px;
            overflow-x: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 20px;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo { font-weight: 900; color: var(--tesla-red); letter-spacing: 3px; font-size: 18px; text-transform: uppercase; }

        .balance-card {
            padding: 35px 20px;
            background: linear-gradient(180deg, #111111 0%, #000000 100%);
            border-bottom: 10px solid #080808;
        }

        .balance-label { color: var(--text-gray); font-size: 13px; text-transform: uppercase; margin-bottom: 8px; }
        .balance-amount { font-size: 42px; font-weight: 800; margin: 5px 0; }
        .btc-calculator { color: var(--tesla-red); font-family: monospace; font-size: 16px; font-weight: bold; }

        .tabs { display: flex; background: var(--bg); border-bottom: 1px solid var(--border); position: sticky; top: 65px; z-index: 999; }
        .tab { flex: 1; padding: 16px; text-align: center; font-size: 13px; font-weight: 700; color: var(--text-gray); cursor: pointer; }
        .tab.active { color: var(--tesla-red); border-bottom: 2px solid var(--tesla-red); }

        .search-wrapper { padding: 15px 20px; }
        .search-bar { width: 100%; background: #111; border: 1px solid #333; padding: 14px 15px; border-radius: 10px; color: #fff; outline: none; }

        .asset-row { display: flex; justify-content: space-between; align-items: center; padding: 18px 20px; border-bottom: 1px solid var(--border); }
        .asset-icon { width: 38px; height: 38px; border-radius: 50%; background: #222; display: flex; align-items: center; justify-content: center; color: var(--tesla-red); font-weight: bold; }
        .price-text { font-weight: 700; font-size: 16px; }
        .up { color: var(--success); } .down { color: var(--danger); }

        .plan-wrapper { padding: 20px; display: none; }
        .plan-card { background: var(--card-bg); border-radius: 16px; padding: 25px; margin-bottom: 20px; border-left: 6px solid var(--tesla-red); }
        .invest-btn { width: 100%; background: var(--tesla-red); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: 800; margin-top: 20px; cursor: pointer; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.95); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 12px 0; z-index: 1001; }
        .nav-item { text-align: center; color: var(--text-gray); text-decoration: none; font-size: 10px; font-weight: 600; }
        .nav-item i { font-size: 22px; margin-bottom: 4px; display: block; }
        .nav-item.active { color: var(--tesla-red); }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">Tesla Base</div>
        <div class="user-actions"><i class="fa-solid fa-circle-user" style="font-size: 24px; color: var(--tesla-red);"></i></div>
    </header>

    <section class="balance-card">
        <div class="balance-label">Total Injected Assets</div>
        <div class="balance-amount" id="usd-balance">$0.00</div>
        <div class="btc-calculator" id="btc-balance">0.00000000 BTC</div>
    </section>

    <nav class="tabs">
        <div class="tab active" id="tab-market" onclick="switchPage('market')">MARKET</div>
        <div class="tab" id="tab-invest" onclick="switchPage('invest')">TESLA GROW</div>
    </nav>

    <main id="page-market">
        <div class="search-wrapper"><input type="text" id="asset-search" class="search-bar" placeholder="Search 200+ Assets..." onkeyup="filterAssets()"></div>
        <div id="asset-list"></div>
    </main>

    <main id="page-invest" class="plan-wrapper">
        <div class="plan-card">
            <h3>7-Day Starter Growth</h3>
            <p style="color: var(--text-gray);">Min: $500 | Return: +15.5%</p>
            <button class="invest-btn" onclick="processInvest(500)">Activate Plan</button>
        </div>
        <div class="plan-card" style="border-left-color: var(--success);">
            <h3>14-Day Premium Tesla</h3>
            <p style="color: var(--text-gray);">Min: $5,000 | Return: +42.0%</p>
            <button class="invest-btn" style="background: var(--success);" onclick="processInvest(5000)">Activate Plan</button>
        </div>
    </main>

    <nav class="nav-bar">
        <a href="#" class="nav-item active" onclick="switchPage('market')"><i class="fa-solid fa-chart-line"></i>Home</a>
        <a href="#" class="nav-item"><i class="fa-solid fa-wallet"></i>Wallet</a>
        <a href="#" class="nav-item" onclick="switchPage('invest')"><i class="fa-solid fa-bolt"></i>Grow</a>
        <a href="#" class="nav-item" onclick="localStorage.clear(); location.reload();"><i class="fa-solid fa-right-from-bracket"></i>Logout</a>
    </nav>
        <script>
        let btcPrice = 69000; 
        const userEmail = localStorage.getItem('userEmail');

        const assetBase = [
            {s: 'BTC', n: 'Bitcoin', p: 69392}, {s: 'ETH', n: 'Ethereum', p: 3510},
            {s: 'TSLA', n: 'Tesla Inc', p: 202.45}, {s: 'SOL', n: 'Solana', p: 145.20}
        ];
        for (let i = 1; i <= 200; i++) {
            assetBase.push({ s: 'AST' + i, n: 'Global Asset ' + i, p: (Math.random() * 150).toFixed(2) });
        }

        async function init() {
            // FIX: If userEmail exists, we STAY. If not, we only redirect if strictly necessary.
            if (!userEmail) {
                console.log("No session found.");
                return; 
            }
            await fetchBtcPrice();
            await syncUserData();
            renderAssets();
            setInterval(syncUserData, 5000); // Fast sync for accuracy
        }

        async function fetchBtcPrice() {
            try {
                const res = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT');
                const data = await res.json();
                if(data.price) btcPrice = parseFloat(data.price);
            } catch (e) { console.warn("Price feed offline"); }
        }

        async function syncUserData() {
            if (!userEmail) return;
            try {
                const res = await fetch(`/api/user/data?email=${encodeURIComponent(userEmail)}`);
                if (!res.ok) return; // Keep current view if server is busy
                const user = await res.json();
                if (user && user.balance !== undefined) {
                    const bal = parseFloat(user.balance);
                    document.getElementById('usd-balance').innerText = `$${bal.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
                    document.getElementById('btc-balance').innerText = (bal / btcPrice).toFixed(8) + " BTC";
                    localStorage.setItem('lastBalance', bal);
                }
            } catch (err) {
                const savedBal = localStorage.getItem('lastBalance') || "0.00";
                document.getElementById('usd-balance').innerText = `$${parseFloat(savedBal).toLocaleString()}`;
            }
        }

        function renderAssets() {
            const list = document.getElementById('asset-list');
            const search = document.getElementById('asset-search').value.toUpperCase();
            list.innerHTML = assetBase.filter(a => a.s.includes(search)).map(a => `
                <div class="asset-row">
                    <div style="display:flex; align-items:center; gap:15px;">
                        <div class="asset-icon">${a.s.charAt(0)}</div>
                        <div><b>${a.s}</b><br><small style="color:var(--text-gray)">${a.n}</small></div>
                    </div>
                    <div style="text-align:right">
                        <div class="price-text">$${parseFloat(a.p).toLocaleString()}</div>
                        <div class="up">+1.25%</div>
                    </div>
                </div>
            `).join('');
        }

        function switchPage(page) {
            document.getElementById('page-market').style.display = page === 'market' ? 'block' : 'none';
            document.getElementById('page-invest').style.display = page === 'invest' ? 'block' : 'none';
            document.getElementById('tab-market').classList.toggle('active', page === 'market');
            document.getElementById('tab-invest').classList.toggle('active', page === 'invest');
        }

        function processInvest(amount) { alert("Investment processing for $" + amount); }
        function filterAssets() { renderAssets(); }

        window.onload = init;
    </script>
</body>
</html>
