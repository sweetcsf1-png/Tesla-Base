<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Base | Master</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #000; --tesla: #E31937; --card: #111; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        .header { padding: 20px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; background: #000; z-index:10; }
        .balance-sec { padding: 30px 20px; background: linear-gradient(to bottom, #111, #000); border-bottom: 5px solid #050505; }
        .price-up { color: #00ff88; font-size: 12px; font-weight: bold; }
        .action-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 20px; }
        .btn-act { background: var(--card); padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #222; cursor: pointer; }
        .btn-act i { display: block; font-size: 20px; color: var(--tesla); margin-bottom: 8px; }
        .asset-list { padding: 0 20px; }
        .asset-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #111; }
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #000; border-top: 1px solid #222; padding: 10px 0; }
        .nav-link { flex: 1; text-align: center; color: #666; text-decoration: none; font-size: 10px; }
        .nav-link.active { color: #fff; }
    </style>
</head>
<body>
    <div class="header">
        <b style="color:var(--tesla); letter-spacing:2px;">TESLA BASE</b>
        <i class="fa-solid fa-user-circle" onclick="location.reload()"></i>
    </div>

    <div class="balance-sec">
        <small style="color:#666">Portfolio Balance</small>
        <div id="usd-bal" style="font-size:35px; font-weight:bold; margin:5px 0;">$0.00</div>
        <div id="btc-calc" style="color:var(--tesla); font-family:monospace;">0.00000000 BTC</div>
        <div class="price-up" id="live-price">Live BTC: Fetching...</div>
    </div>

    <div class="action-grid">
        <div class="btn-act"><i class="fa-solid fa-plus"></i>Deposit</div>
        <div class="btn-act"><i class="fa-solid fa-minus"></i>Withdraw</div>
        <div class="btn-act"><i class="fa-solid fa-sync"></i>Convert</div>
    </div>

    <div class="asset-list">
        <h4 style="margin-bottom:10px;">Market Assets (200+)</h4>
        <input type="text" id="search" placeholder="Search Assets..." style="width:100%; padding:10px; background:#111; border:1px solid #333; color:#fff; border-radius:5px; margin-bottom:15px;">
        <div id="display-assets"></div>
    </div>

    <nav class="nav">
        <a href="#" class="nav-link active"><i class="fa-solid fa-home"></i><br>Home</a>
        <a href="#" class="nav-link"><i class="fa-solid fa-chart-line"></i><br>Trade</a>
        <a href="#" class="nav-link"><i class="fa-solid fa-wallet"></i><br>Wallet</a>
    </nav>

    <script>
        let currentBtc = 0;
        const assets = [{s:'BTC', n:'Bitcoin'}, {s:'ETH', n:'Ethereum'}, {s:'TSLA', n:'Tesla'}];
        for(let i=1; i<200; i++) assets.push({s:'ALT'+i, n:'Asset '+i});

        async function updatePrice() {
            try {
                const res = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT');
                const data = await res.json();
                currentBtc = parseFloat(data.price);
                document.getElementById('live-price').innerText = `Live BTC: $${currentBtc.toLocaleString()}`;
                refreshBalance();
            } catch(e) { console.log("Price fetch failed"); }
        }

        async function refreshBalance() {
            const email = localStorage.getItem('userEmail');
            if(!email) return;
            const res = await fetch(`/api/user/data?email=${email}`);
            const data = await res.json();
            if(data) {
                document.getElementById('usd-bal').innerText = `$${parseFloat(data.balance).toLocaleString()}`;
                document.getElementById('btc-calc').innerText = (data.balance / currentBtc).toFixed(8) + " BTC";
            }
        }

        function renderAssets() {
            const search = document.getElementById('search').value.toUpperCase();
            document.getElementById('display-assets').innerHTML = assets.filter(a => a.s.includes(search)).map(a => `
                <div class="asset-item">
                    <div><b>${a.s}</b><br><small style="color:#666">${a.n}</small></div>
                    <div style="text-align:right"><b>$${(Math.random()*100).toFixed(2)}</b><br><small class="price-up">+1.2%</small></div>
                </div>
            `).join('');
        }

        setInterval(updatePrice, 5000);
        document.getElementById('search').onkeyup = renderAssets;
        window.onload = () => { updatePrice(); renderAssets(); };
    </script>
</body>
</html>
