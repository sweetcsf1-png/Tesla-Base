<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tesla Base | Premium Terminal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://s3.tradingview.com/tv.js"></script>
    <style>
        :root { --t-red: #E31937; --bg: #000; --card: #0a0a0a; --border: #1a1a1a; --success: #00ffa3; --warning: #ffb800; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        .p-header { padding: 40px 20px; background: linear-gradient(180deg, #0d0d0d 0%, #000 100%); border-bottom: 1px solid var(--border); }
        .bal-usd { font-size: 42px; font-weight: 900; letter-spacing: -1.5px; margin: 0; }
        .bal-btc { font-family: 'JetBrains Mono', monospace; color: var(--success); font-size: 14px; margin-top: 5px; }
        .action-bar { display: flex; gap: 10px; padding: 0 20px; margin-top: -25px; }
        .action-btn { flex: 1; padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: var(--card); color: #fff; font-weight: 800; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .asset-card { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--card); border: 1px solid var(--border); border-radius: 15px; margin-bottom: 10px; cursor: pointer; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; display: none; flex-direction: column; }
        .modal-content { flex: 1; padding: 25px; overflow-y: auto; padding-bottom: 100px; }
        
        /* EXACT MATCH TO YOUR UPLOADED IMAGE */
        .tab-sub-nav { display: flex; background: #231a14; padding: 5px; border-radius: 10px; margin-bottom: 20px; }
        .tab-sub { flex: 1; background: none; border: none; color: #d4a373; padding: 10px; border-radius: 8px; font-weight: 600; font-size: 13px; cursor: pointer; }
        .tab-sub.active { background: #f5cc91; color: #231a14; }
        .history-card { background: #15100c; border-radius: 12px; padding: 20px; margin-bottom: 15px; border: 1px solid #231a14; }
        .hc-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }
        .hc-label { color: #888; }
        .hc-val { color: #eee; font-family: 'JetBrains Mono', monospace; }
        .symbol-badge { background: #E31937; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 900; color: #fff; }

        .tab-bar { position: fixed; bottom: 0; width: 100%; height: 85px; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); display: flex; border-top: 1px solid var(--border); z-index: 9000; padding-bottom: 15px; }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #444; text-transform: uppercase; cursor: pointer; }
        .tab-item.active { color: var(--t-red); }
    </style>
</head>
<body>
    <div id="v-market" class="view" style="display:block;">
        <div class="p-header">
            <p style="color:#666; font-size:11px; text-transform:uppercase;">Available Balance</p>
            <h1 class="bal-usd" id="usdBalance">$0.00</h1>
            <div class="bal-btc" id="btcBalance">0.00000000 BTC</div>
        </div>
        <div class="action-bar">
            <div class="action-btn" onclick="openModal('modalDeposit')">Deposit</div>
            <div class="action-btn" onclick="openModal('modalWithdraw')">Withdraw</div>
        </div>
        <div id="assetList" style="padding:40px 20px 100px;"></div>
    </div>

    <div id="v-history" class="view" style="display:none; padding:20px 15px 100px;">
        <div class="tab-sub-nav">
            <button class="tab-sub active" onclick="toggleHistoryTab('holdings')">My Holdings</button>
            <button class="tab-sub" onclick="toggleHistoryTab('closed')">Closed Positions</button>
        </div>
        <div id="ledger-list"></div>
    </div>

    <div id="tradeTerminal" class="modal">
        <div class="modal-content" style="padding:0; background:#000;">
            <div style="padding:15px; display:flex; justify-content:space-between; align-items:center;">
                <h3 id="chartSym" style="margin:0;">BTC/USD</h3>
                <span class="close-btn" onclick="closeModals()">&times;</span>
            </div>
            <div id="chartContainer" style="height:350px; width:100%;"></div>
            <div style="padding:20px;">
                <input type="number" id="tradeQty" placeholder="Amount ($)" style="width:100%; background:#111; border:1px solid #333; padding:15px; border-radius:10px; color:#fff; margin-bottom:15px;">
                <div style="display:flex; gap:10px;">
                    <button class="action-btn" style="background:var(--success); color:#000;" onclick="processTrade('BUY')">BUY</button>
                    <button class="action-btn" style="background:var(--t-red);" onclick="processTrade('SELL')">SELL</button>
                </div>
            </div>
        </div>
    </div>

    <nav class="tab-bar">
        <div class="tab-item active" onclick="nav('v-market', this)"><i class="fa-solid fa-chart-line"></i>Market</div>
        <div class="tab-item" onclick="nav('v-invest', this)"><i class="fa-solid fa-bolt"></i>Invest</div>
        <div class="tab-item" onclick="nav('v-history', this)"><i class="fa-solid fa-history"></i>History</div>
        <div class="tab-item" onclick="logout()"><i class="fa-solid fa-power-off"></i>Exit</div>
            </nav>
            <script>
    const api = window.location.origin;
    const email = localStorage.getItem('userEmail');
    let userBalance = 0;
    let selectedAsset = "";

    const assets = [
        { s: 'BTC', n: 'Bitcoin', logo: 'https://cryptologos.cc/logos/bitcoin-btc-logo.png' },
        { s: 'ETH', n: 'Ethereum', logo: 'https://cryptologos.cc/logos/ethereum-eth-logo.png' },
        { s: 'TSLA', n: 'Tesla Inc', logo: 'https://www.logo.wine/a/logo/Tesla%2C_Inc./Tesla%2C_Inc.-Logo.wine.svg' },
        { s: 'ZD', n: 'Ziff Davis, Inc.', logo: 'https://logo.clearbit.com/ziffdavis.com' },
        { s: 'AAPL', n: 'Apple Inc', logo: 'https://logo.clearbit.com/apple.com' },
        { s: 'NVDA', n: 'NVIDIA', logo: 'https://logo.clearbit.com/nvidia.com' },
        { s: 'XAU', n: 'Gold Spot', logo: 'https://cdn-icons-png.flaticon.com/512/2912/2912761.png' },
        { s: 'MSFT', n: 'Microsoft', logo: 'https://logo.clearbit.com/microsoft.com' },
        { s: 'AMZN', n: 'Amazon', logo: 'https://logo.clearbit.com/amazon.com' },
        { s: 'META', n: 'Meta', logo: 'https://logo.clearbit.com/meta.com' },
        { s: 'NFLX', n: 'Netflix', logo: 'https://logo.clearbit.com/netflix.com' },
        { s: 'GOOGL', n: 'Alphabet', logo: 'https://logo.clearbit.com/google.com' },
        { s: 'SOL', n: 'Solana', logo: 'https://cryptologos.cc/logos/solana-sol-logo.png' },
        { s: 'COIN', n: 'Coinbase', logo: 'https://logo.clearbit.com/coinbase.com' },
        { s: 'UBER', n: 'Uber', logo: 'https://logo.clearbit.com/uber.com' },
        { s: 'SHOP', n: 'Shopify', logo: 'https://logo.clearbit.com/shopify.com' },
        { s: 'DOGE', n: 'Dogecoin', logo: 'https://cryptologos.cc/logos/dogecoin-doge-logo.png' },
        { s: 'BNB', n: 'Binance', logo: 'https://cryptologos.cc/logos/bnb-bnb-logo.png' },
        { s: 'ADA', n: 'Cardano', logo: 'https://cryptologos.cc/logos/cardano-ada-logo.png' },
        { s: 'XRP', n: 'Ripple', logo: 'https://cryptologos.cc/logos/xrp-xrp-logo.png' },
        { s: 'LTC', n: 'Litecoin', logo: 'https://cryptologos.cc/logos/litecoin-ltc-logo.png' },
        { s: 'BABA', n: 'Alibaba', logo: 'https://logo.clearbit.com/alibaba.com' },
        { s: 'V', n: 'Visa', logo: 'https://logo.clearbit.com/visa.com' },
        { s: 'MA', n: 'Mastercard', logo: 'https://logo.clearbit.com/mastercard.com' },
        { s: 'PYPL', n: 'PayPal', logo: 'https://logo.clearbit.com/paypal.com' },
        { s: 'INTC', n: 'Intel', logo: 'https://logo.clearbit.com/intel.com' },
        { s: 'AMD', n: 'AMD', logo: 'https://logo.clearbit.com/amd.com' },
        { s: 'NKE', n: 'Nike', logo: 'https://logo.clearbit.com/nike.com' },
        { s: 'SBUX', n: 'Starbucks', logo: 'https://logo.clearbit.com/starbucks.com' },
        { s: 'KO', n: 'Coca-Cola', logo: 'https://logo.clearbit.com/cocacola.com' },
        { s: 'DIS', n: 'Disney', logo: 'https://logo.clearbit.com/disney.com' },
        { s: 'WMT', n: 'Walmart', logo: 'https://logo.clearbit.com/walmart.com' },
        { s: 'COST', n: 'Costco', logo: 'https://logo.clearbit.com/costco.com' },
        { s: 'TM', n: 'Toyota', logo: 'https://logo.clearbit.com/toyota.com' },
        { s: 'F', n: 'Ford', logo: 'https://logo.clearbit.com/ford.com' },
        { s: 'GM', n: 'GM', logo: 'https://logo.clearbit.com/gm.com' },
        { s: 'ABNB', n: 'Airbnb', logo: 'https://logo.clearbit.com/airbnb.com' },
        { s: 'SPOT', n: 'Spotify', logo: 'https://logo.clearbit.com/spotify.com' },
        { s: 'SQ', n: 'Block', logo: 'https://logo.clearbit.com/block.xyz' },
        { s: 'T', n: 'AT&T', logo: 'https://logo.clearbit.com/att.com' },
        { s: 'VZ', n: 'Verizon', logo: 'https://logo.clearbit.com/verizon.com' },
        { s: 'ORCL', n: 'Oracle', logo: 'https://logo.clearbit.com/oracle.com' },
        { s: 'CRM', n: 'Salesforce', logo: 'https://logo.clearbit.com/salesforce.com' },
        { s: 'IBM', n: 'IBM', logo: 'https://logo.clearbit.com/ibm.com' },
        { s: 'CSCO', n: 'Cisco', logo: 'https://logo.clearbit.com/cisco.com' },
        { s: 'HD', n: 'Home Depot', logo: 'https://logo.clearbit.com/homedepot.com' },
        { s: 'LOW', n: 'Lowes', logo: 'https://logo.clearbit.com/lowes.com' },
        { s: 'PEP', n: 'Pepsi', logo: 'https://logo.clearbit.com/pepsico.com' },
        { s: 'MCD', n: 'McDonalds', logo: 'https://logo.clearbit.com/mcdonalds.com' },
        { s: 'JNJ', n: 'J&J', logo: 'https://logo.clearbit.com/jnj.com' }
    ];

    async function sync() {
        const res = await fetch(`${api}/api/user/data?email=${email}`);
        const data = await res.json();
        userBalance = parseFloat(data.balance);
        document.getElementById('usdBalance').innerText = `$${userBalance.toLocaleString(undefined,{minimumFractionDigits:2})}`;
        document.getElementById('btcBalance').innerText = `${(userBalance / 68000).toFixed(8)} BTC`;
        renderAssets();
        renderLedger();
    }

    async function processTrade(side) {
        const qty = parseFloat(document.getElementById('tradeQty').value);
        if(!qty || qty > userBalance) return alert("Insufficient funds.");
        
        const buyPrice = (Math.random() * 50 + 20).toFixed(2);
        const orderId = "PRE" + Date.now();
        
        const trade = {
            id: orderId,
            asset: selectedAsset.n,
            symbol: selectedAsset.s,
            buyPrice: buyPrice,
            sellPrice: side === 'SELL' ? (buyPrice * 1.61).toFixed(2) : "---",
            qty: (qty / buyPrice).toFixed(2),
            fee: "0.22",
            profit: (qty * 0.61).toFixed(4),
            time: new Date().toLocaleString(),
            status: side === 'SELL' ? 'Closed' : 'Open'
        };

        let history = JSON.parse(localStorage.getItem(`ledger_${email}`)) || [];
        history.unshift(trade);
        localStorage.setItem(`ledger_${email}`, JSON.stringify(history));

        await fetch(`${api}/api/user/update-balance`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ email, amount: -qty, type: 'TRADE' })
        });

        alert("Trade executed and logged to history.");
        closeModals(); sync();
    }

    function renderLedger() {
        const list = JSON.parse(localStorage.getItem(`ledger_${email}`)) || [];
        document.getElementById('ledger-list').innerHTML = list.map(t => `
            <div class="history-card">
                <div style="margin-bottom:10px;">
                    <span style="color:#eee; font-weight:800;">${t.asset}</span><br>
                    <span class="symbol-badge">${t.symbol}</span>
                </div>
                <div class="hc-row"><span class="hc-label">Order No</span><span class="hc-val">${t.id}</span></div>
                <div class="hc-row"><span class="hc-label">Purchase Time</span><span class="hc-val">${t.time}</span></div>
                <div class="hc-row"><span class="hc-label">Buy Price</span><span class="hc-val">${t.buyPrice}</span></div>
                ${t.status === 'Closed' ? `<div class="hc-row"><span class="hc-label">Sell Price</span><span class="hc-val">${t.sellPrice}</span></div>` : ''}
                <div class="hc-row"><span class="hc-label">Quantity</span><span class="hc-val">${t.qty}</span></div>
                <div class="hc-row"><span class="hc-label">Transaction Fee</span><span class="hc-val">${t.fee}</span></div>
                <div class="hc-row"><span class="hc-label">Return (%)</span><span class="hc-val" style="color:var(--success)">61.00%</span></div>
                <div class="hc-row"><span class="hc-label">Profit/Loss</span><span class="hc-val" style="color:var(--success)">${t.profit}</span></div>
            </div>
        `).join('');
    }

    function renderAssets() {
        document.getElementById('assetList').innerHTML = assets.map(a => `
            <div class="asset-card" onclick="openTradingTerminal('${a.s}')">
                <div style="display:flex; align-items:center; gap:12px;">
                    <img src="${a.logo}" style="width:30px; height:30px; border-radius:5px;">
                    <div><div style="font-weight:800;">${a.s}</div><div style="font-size:10px; color:#555;">${a.n}</div></div>
                </div>
                <div style="text-align:right;">
                    <div style="font-family:monospace;">$${(Math.random()*500).toFixed(2)}</div>
                    <div style="color:var(--success); font-size:10px;">+2.1%</div>
                </div>
            </div>
        `).join('');
    }

    function openTradingTerminal(symbol) {
        selectedAsset = assets.find(a => a.s === symbol);
        document.getElementById('chartSym').innerText = symbol + "/USD";
        document.getElementById('tradeTerminal').style.display = 'flex';
        new TradingView.widget({
            "container_id": "chartContainer",
            "symbol": symbol + "USD",
            "interval": "5",
            "theme": "dark",
            "style": "1",
            "width": "100%",
            "height": 350,
            "hide_top_toolbar": true
        });
    }

    function nav(id, el) {
        document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        if(id === 'v-history') renderLedger();
    }
    function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
    window.onload = sync;
</script>
</body>
</html>
