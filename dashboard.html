<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OKX | Home</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="okx-top-toggle">
        <div class="toggle-item active" onclick="switchTab('exchange')">Exchange</div>
        <div class="toggle-item" onclick="switchTab('wallet')">Wallet</div>
    </div>

    <div class="dashboard-header" style="padding: 20px;">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span style="color:var(--gray-text); font-size:14px;">Total Equity (USD) <i class="fa-regular fa-eye-slash" onclick="toggleBalanceBlur()" style="margin-left:5px; cursor:pointer;"></i></span>
            <i class="fa-solid fa-headset" onclick="location.href='support.html'"></i>
        </div>
        <h1 id="total-balance" class="balance-main">$0.00</h1>
        <div class="balance-sub">+$0.00 (0.00%) Today</div>
        
        <div class="quick-actions">
            <div class="action-btn-circle" onclick="location.href='deposit.html'"><div class="circle-icon"><i class="fa-solid fa-arrow-down"></i></div>Deposit</div>
            <div class="action-btn-circle" onclick="location.href='withdraw.html'"><div class="circle-icon"><i class="fa-solid fa-paper-plane"></i></div>Withdraw</div>
            <div class="action-btn-circle" onclick="location.href='trading.html'"><div class="circle-icon"><i class="fa-solid fa-repeat"></i></div>Swap</div>
            <div class="action-btn-circle" onclick="location.href='investment.html'"><div class="circle-icon"><i class="fa-solid fa-vault"></i></div>Earn</div>
        </div>
    </div>

    <div class="market-tabs">
        <span class="m-tab active">Favorites</span>
        <span class="m-tab">Hot</span>
        <span class="m-tab">Gainers</span>
        <span class="m-tab">New</span>
    </div>

    <div id="asset-list-container">
        </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item active"><i class="fa-solid fa-house"></i>Home</a>
        <a href="trading.html" class="nav-item"><i class="fa-solid fa-chart-simple"></i>Trade</a>
        <a href="investment.html" class="nav-item"><i class="fa-solid fa-piggy-bank"></i>Earn</a>
        <a href="history.html" class="nav-item"><i class="fa-solid fa-clock-rotate-left"></i>History</a>
        <a href="settings.html" class="nav-item"><i class="fa-solid fa-user"></i>Profile</a>
    </nav>

    <script src="app.js"></script>
    <script>
        function toggleBalanceBlur() {
            const b = document.getElementById('total-balance');
            b.classList.toggle('blurred-text');
        }
        window.onload = () => { applySavedTheme(); loadUserAssets(); };
    </script>
</body>
</html>
