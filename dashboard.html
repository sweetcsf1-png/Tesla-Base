<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tesla Base | Premium Terminal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://s3.tradingview.com/tv.js"></script>
    <style>
        :root { --t-red: #E31937; --bg: #000; --card: #0a0a0a; --border: #1a1a1a; --success: #00ffa3; --text: #fff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Balance Header */
        .p-header { padding: 40px 20px; background: linear-gradient(180deg, #0d0d0d 0%, #000 100%); border-bottom: 1px solid var(--border); position: relative; }
        .bal-container { display: flex; align-items: center; gap: 15px; }
        .bal-usd { font-size: 42px; font-weight: 800; margin: 0; letter-spacing: -1.5px; }
        .hide-eye { font-size: 24px; color: #444; cursor: pointer; transition: 0.3s; }
        .hide-eye:hover { color: var(--text); }
        .bal-btc { font-family: 'JetBrains Mono', monospace; color: var(--success); font-size: 14px; margin-top: 5px; }
        
        /* Search Bar */
        .search-container { padding: 10px 20px; position: sticky; top: 0; background: var(--bg); z-index: 100; }
        .search-input { width: 100%; padding: 12px 40px; background: #111; border: 1px solid var(--border); border-radius: 10px; color: #fff; font-size: 14px; }
        .search-icon { position: absolute; left: 32px; top: 22px; color: #555; }

        .action-bar { display: flex; gap: 10px; padding: 0 20px; margin-top: -25px; }
        .action-btn { flex: 1; padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: var(--card); color: #fff; font-weight: 800; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }

        /* Market Assets */
        .asset-card { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--card); border: 1px solid var(--border); border-radius: 15px; margin-bottom: 12px; cursor: pointer; }
        .asset-logo { width: 40px; height: 40px; border-radius: 50%; background: #1a1a1a; object-fit: contain; padding: 5px; }

        /* History Brown Theme */
        .tab-sub-nav { display: flex; background: #231a14; padding: 5px; border-radius: 10px; margin: 20px 15px; }
        .tab-sub { flex: 1; background: none; border: none; color: #d4a373; padding: 10px; border-radius: 8px; font-weight: 600; font-size: 13px; cursor: pointer; }
        .tab-sub.active { background: #f5cc91; color: #231a14; }
        
        .history-card { background: #15100c; border-radius: 12px; padding: 20px; margin: 0 15px 15px; border: 1px solid #231a14; }
        
        /* Modals & Terminal */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 10000; display: none; flex-direction: column; overflow-y: auto; padding: 20px; }
        .modal-content { background: #0a0a0a; border: 1px solid #222; border-radius: 20px; padding: 25px; margin-top: 50px; }
        input, select { width: 100%; padding: 18px; background: #111; border: 1px solid #333; color: #fff; border-radius: 12px; margin-bottom: 15px; font-size: 16px; }
        
        /* Footer Nav */
        .tab-bar { position: fixed; bottom: 0; width: 100%; height: 85px; background: #000; display: flex; border-top: 1px solid var(--border); z-index: 9000; padding-bottom: 15px; }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #444; cursor: pointer; }
        .tab-item.active { color: var(--t-red); }
        
        .about-text { color: #888; font-size: 14px; line-height: 1.8; text-align: justify; }
    </style>
</head>
<body>

    <div id="v-market" class="view">
        <div class="p-header">
            <div class="bal-container">
                <h1 class="bal-usd" id="mainBal">$0.00</h1>
                <i class="fa-solid fa-eye hide-eye" id="toggleBal" onclick="toggleBalanceVisibility()"></i>
            </div>
            <div class="bal-btc" id="btcBal">0.00000000 BTC</div>
        </div>
        <div class="action-bar">
            <div class="action-btn" onclick="openModal('modalDeposit')">Deposit</div>
            <div class="action-btn" onclick="openModal('modalWithdraw')">Withdraw</div>
        </div>
        
        <div class="search-container">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input type="text" class="search-input" id="assetSearch" placeholder="Search markets..." oninput="filterAssets()">
        </div>

        <div id="marketList" style="padding:10px 20px 100px;"></div>
    </div>

    <div id="v-invest" class="view" style="display:none; padding:30px 20px 100px;">
        <h1 style="font-weight:800; margin-bottom:25px;">Investment Plans</h1>
        <div id="investmentList"></div>
    </div>

    <div id="v-history" class="view" style="display:none; padding-bottom:100px;">
        <div class="tab-sub-nav">
            <button class="tab-sub active" id="btnHoldings" onclick="switchHist('live')">My Holdings</button>
            <button class="tab-sub" id="btnClosed" onclick="switchHist('closed')">Closed Positions</button>
        </div>
        <div id="historyContainer"></div>
    </div>

    <div id="v-exit" class="view" style="display:none; padding:40px 20px 100px;">
        <div style="background:#111; padding:20px; border-radius:15px; margin-bottom:20px;">
            <h3>User ID: <span id="displayUserID" style="color:var(--t-red)">...</span></h3>
            <button class="action-btn" style="width:100%; background:var(--t-red);" onclick="confirmLogout()">LOGOUT</button>
        </div>
        <div style="background:#111; padding:20px; border-radius:15px;">
            <h3>About Tesla Base</h3>
            <div class="about-text" id="aboutContent"></div>
        </div>
    </div>
    <script>
    const email = localStorage.getItem('userEmail') || "user@test.com"; 
    let balance = 0;
    let isBalHidden = false;
    let currentHistTab = 'live';

    // 50 Assets with Logos
    const assets = [
        { s: 'TSLA', n: 'Tesla Inc', logo: 'https://logo.clearbit.com/tesla.com' },
        { s: 'BTC', n: 'Bitcoin', logo: 'https://cryptologos.cc/logos/bitcoin-btc-logo.png' },
        { s: 'ETH', n: 'Ethereum', logo: 'https://cryptologos.cc/logos/ethereum-eth-logo.png' },
        { s: 'AAPL', n: 'Apple Inc', logo: 'https://logo.clearbit.com/apple.com' },
        { s: 'NVDA', n: 'NVIDIA', logo: 'https://logo.clearbit.com/nvidia.com' },
        { s: 'XAU', n: 'Gold Spot', logo: 'https://cdn-icons-png.flaticon.com/512/2912/2912761.png' },
        { s: 'AMZN', n: 'Amazon', logo: 'https://logo.clearbit.com/amazon.com' },
        { s: 'SOL', n: 'Solana', logo: 'https://cryptologos.cc/logos/solana-sol-logo.png' },
        { s: 'META', n: 'Meta Platforms', logo: 'https://logo.clearbit.com/meta.com' },
        { s: 'NFLX', n: 'Netflix', logo: 'https://logo.clearbit.com/netflix.com' }
        // ... (remaining 40 assets follow this pattern)
    ];

    async function init() {
        try {
            const res = await fetch(`/api/user/data?email=${email}`);
            const data = await res.json();
            
            // Fix NaN: Ensure we default to 0 if data is missing
            balance = parseFloat(data.balance) || 0;
            document.getElementById('displayUserID').innerText = data.userId || "T-8829";
            
            updateBalUI();
            renderMarket(assets);
            generateAboutText();
        } catch (e) {
            console.error("Fetch error, using local defaults.");
            balance = 0;
            updateBalUI();
            renderMarket(assets);
        }
    }

    function updateBalUI() {
        const usdEl = document.getElementById('mainBal');
        const btcEl = document.getElementById('btcBal');
        if (isBalHidden) {
            usdEl.innerText = "$****";
            btcEl.innerText = "**** BTC";
        } else {
            usdEl.innerText = `$${balance.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            btcEl.innerText = `${(balance / 68000).toFixed(8)} BTC`;
        }
    }

    function toggleBalanceVisibility() {
        isBalHidden = !isBalHidden;
        const icon = document.getElementById('toggleBal');
        icon.className = isBalHidden ? "fa-solid fa-eye-slash hide-eye" : "fa-solid fa-eye hide-eye";
        updateBalUI();
    }

    function renderMarket(dataList) {
        const list = document.getElementById('marketList');
        list.innerHTML = dataList.map(a => `
            <div class="asset-card" onclick="openTradeTerminal('${a.s}')">
                <div style="display:flex; align-items:center; gap:12px;">
                    <img src="${a.logo}" class="asset-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2912/2912761.png'">
                    <div><div style="font-weight:800;">${a.s}</div><div style="font-size:11px; color:#555;">${a.n}</div></div>
                </div>
                <div style="text-align:right;">
                    <div style="font-family:'JetBrains Mono'; font-weight:700;">$${(Math.random()*200 + 50).toFixed(2)}</div>
                    <div style="color:var(--success); font-size:11px;">+${(Math.random()*2).toFixed(2)}%</div>
                </div>
            </div>`).join('');
    }

    function filterAssets() {
        const query = document.getElementById('assetSearch').value.toLowerCase();
        const filtered = assets.filter(a => a.s.toLowerCase().includes(query) || a.n.toLowerCase().includes(query));
        renderMarket(filtered);
    }
    </script>
    <script>
    function openTradeTerminal(sym) {
        const asset = assets.find(x => x.s === sym);
        document.body.insertAdjacentHTML('beforeend', `
            <div id="terminal" class="modal" style="display:flex;">
                <div style="padding:15px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #222;">
                    <h3 style="margin:0;">${asset.s} Trading View</h3>
                    <i class="fa-solid fa-xmark" onclick="document.getElementById('terminal').remove()" style="font-size:24px;"></i>
                </div>
                <div id="chart_container" style="flex:1; width:100%;"></div>
                <div style="padding:20px; background:#0a0a0a;">
                    <input type="number" id="tradeAmt" placeholder="Enter Amount ($)">
                    <div style="display:flex; gap:10px;">
                        <button class="action-btn" style="background:var(--success); color:#000;" onclick="execTrade('${asset.s}', 'BUY')">BUY</button>
                        <button class="action-btn" style="background:var(--t-red); color:#fff;" onclick="execTrade('${asset.s}', 'SELL')">SELL</button>
                    </div>
                </div>
            </div>
        `);

        new TradingView.widget({
            "container_id": "chart_container",
            "symbol": sym + "USD",
            "interval": "D",
            "theme": "dark",
            "autosize": true
        });
    }

    async function submitWithdraw() {
        const type = document.getElementById('w_type').value;
        const addr = document.getElementById('w_addr').value;
        const amt = parseFloat(document.getElementById('w_amt').value);

        if (amt < 3500) {
            return alert("Withdrawal Failed: Minimum withdrawal amount is $3,500.00");
        }
        if (amt > balance) return alert("Insufficient funds.");

        alert(`Withdrawal Request of $${amt} received. A 15% maintenance fee is required before final approval.`);
    }

    function generateAboutText() {
        let text = "";
        for(let i=1; i<=400; i++) {
            text += `<p>Paragraph ${i}: Tesla Base is a revolutionary high-frequency trading infrastructure sponsored directly by the vision of Elon Musk and Tesla Inc. Built on the bedrock of decentralization, it has become the most trusted platform across North America, Europe, and Asia. Our proprietary neural networks analyze over 50 market sectors in milliseconds, ensuring that every user, from Bronze to Diamond, experiences the pinnacle of financial engineering. With zero-latency execution and military-grade encryption, your assets remain secured in cold storage, backed by the largest liquidity providers in the world. Tesla Base isn't just a website; it is the future of the global economy, vetted by international financial regulators and used by millions of professional traders globally.</p>`;
        }
        document.getElementById('aboutContent').innerHTML = text;
    }

    function nav(id, el) {
        document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        document.querySelectorAll('.tab-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
    }

    window.onload = init;
</script>

<div id="modalWithdraw" class="modal">
    <div class="modal-content">
        <h2>Withdrawal</h2>
        <select id="w_type">
            <option value="bank">Bank Transfer</option>
            <option value="crypto">Crypto Wallet (BTC/ETH)</option>
        </select>
        <input type="text" id="w_addr" placeholder="Enter Account/Address">
        <input type="number" id="w_amt" placeholder="Amount">
        <button class="action-btn" style="background:var(--success); color:#000; width:100%;" onclick="submitWithdraw()">Withdraw Now</button>
        <button class="action-btn" style="width:100%; margin-top:10px;" onclick="closeModal('modalWithdraw')">Cancel</button>
    </div>
</div>

<nav class="tab-bar">
    <div class="tab-item active" onclick="nav('v-market', this)"><i class="fa-solid fa-chart-line"></i>MARKET</div>
    <div class="tab-item" onclick="nav('v-invest', this)"><i class="fa-solid fa-bolt"></i>INVEST</div>
    <div class="tab-item" onclick="nav('v-history', this)"><i class="fa-solid fa-history"></i>HISTORY</div>
    <div class="tab-item" onclick="nav('v-exit', this)"><i class="fa-solid fa-gear"></i>SETTINGS</div>
</nav>
</body>
</html>
