<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tesla Base | Premium Terminal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://s3.tradingview.com/tv.js"></script>
    
    <style>
        :root { --t-red: #E31937; --bg: #000; --card: #0a0a0a; --border: #1a1a1a; --success: #00ffa3; --warning: #ffb800; --text: #fff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }

        /* Balance Header */
        .p-header { padding: 40px 20px; background: linear-gradient(180deg, #0d0d0d 0%, #000 100%); border-bottom: 1px solid var(--border); }
        .bal-usd { font-size: 42px; font-weight: 900; letter-spacing: -1.5px; margin: 0; }
        .bal-btc { font-family: 'JetBrains Mono', monospace; color: var(--success); font-size: 14px; margin-top: 5px; opacity: 0.9; }

        /* Action Buttons */
        .action-bar { display: flex; gap: 10px; padding: 0 20px; margin-top: -25px; }
        .action-btn { flex: 1; padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: var(--card); color: #fff; font-weight: 800; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }

        /* Assets & Trading */
        .asset-card { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--card); border: 1px solid var(--border); border-radius: 15px; margin-bottom: 10px; cursor: pointer; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; display: none; flex-direction: column; }
        .modal-content { flex: 1; padding: 25px; overflow-y: auto; padding-bottom: 100px; }
        .close-btn { font-size: 30px; float: right; cursor: pointer; color: var(--t-red); }

        /* Professional History Ledger (Matching your style) */
        .history-card { background: #111; border-radius: 12px; padding: 20px; margin-bottom: 15px; border-left: 4px solid var(--border); }
        .hc-type { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #555; margin-bottom: 5px; }
        .hc-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 12px; border-bottom: 1px solid #1a1a1a; padding-bottom: 4px; }
        .hc-label { color: #666; }
        .hc-val { color: #fff; font-family: 'JetBrains Mono', monospace; font-weight: 600; }
        .status-badge { padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 800; }

        /* Navigation */
        .tab-bar { position: fixed; bottom: 0; width: 100%; height: 85px; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); display: flex; border-top: 1px solid var(--border); z-index: 9000; padding-bottom: 15px; }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #444; text-transform: uppercase; cursor: pointer; }
        .tab-item.active { color: var(--t-red); }
        .tab-item i { font-size: 22px; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div id="modalDeposit" class="modal"><div class="modal-content">...</div></div>
    
    <div id="tradeTerminal" class="modal">
        <div class="modal-content" style="padding:0; background:#000;">
            <div style="padding:15px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #111;">
                <h3 id="chartSym" style="margin:0; font-weight:800;">BTC/USD</h3>
                <span class="close-btn" onclick="closeModals()">&times;</span>
            </div>
            <div id="chartContainer" style="height:350px; width:100%;"></div>
            <div style="padding:20px; background:#0a0a0a;">
                <input type="number" id="tradeQty" placeholder="Amount to Trade ($)" style="width:100%; background:#000; border:1px solid var(--border); padding:15px; border-radius:10px; color:#fff; font-weight:bold; margin-bottom:15px;">
                <div style="display:flex; gap:10px;">
                    <button class="invest-btn" onclick="handleTrade('BUY')" style="background:var(--success); color:#000;">BUY / LONG</button>
                    <button class="invest-btn" onclick="handleTrade('SELL')">SELL / SHORT</button>
                </div>
            </div>
        </div>
    </div>

    <div id="v-market" class="view">
        <div class="p-header">
            <h1 class="bal-usd" id="usdBalance">$0.00</h1>
            <div class="bal-btc" id="btcBalance">0.00000000 BTC</div>
        </div>
        <div class="action-bar">
            <div class="action-btn" onclick="openModal('modalDeposit')">Deposit</div>
            <div class="action-btn" onclick="openModal('modalWithdraw')">Withdraw</div>
        </div>
        <div id="assetList" style="padding:40px 20px 20px;"></div>
    </div>

    <div id="v-invest" class="view" style="display:none; padding:30px 20px 100px;">
        <h1 style="font-weight:800;">Investment Plans</h1>
        </div>

    <div id="v-history" class="view" style="display:none; padding:30px 20px 100px;">
        <h1 style="font-weight:800; margin-bottom:20px;">Activity Ledger</h1>
        <div id="ledger-list"></div>
    </div>

    <nav class="tab-bar">
        <div class="tab-item active" onclick="nav('v-market', this)"><i class="fa-solid fa-chart-line"></i>Market</div>
        <div class="tab-item" onclick="nav('v-invest', this)"><i class="fa-solid fa-bolt"></i>Invest</div>
        <div class="tab-item" onclick="nav('v-history', this)"><i class="fa-solid fa-history"></i>History</div>
        <div class="tab-item" onclick="logout()"><i class="fa-solid fa-power-off"></i>Exit</div>
    </nav>
    <script>
    const api = window.location.origin;
    const email = localStorage.getItem('userEmail');
    let userBalance = 0;
    let currentAsset = null;

    const assets = [
        { s: 'BTC', n: 'Bitcoin', logo: 'https://cryptologos.cc/logos/bitcoin-btc-logo.png' },
        { s: 'ETH', n: 'Ethereum', logo: 'https://cryptologos.cc/logos/ethereum-eth-logo.png' },
        { s: 'TSLA', n: 'Tesla Inc', logo: 'https://www.logo.wine/a/logo/Tesla%2C_Inc./Tesla%2C_Inc.-Logo.wine.svg' },
        { s: 'AAPL', n: 'Apple Inc', logo: 'https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg' },
        { s: 'NVDA', n: 'NVIDIA', logo: 'https://upload.wikimedia.org/wikipedia/sco/2/21/Nvidia_logo.svg' },
        { s: 'XAU', n: 'Gold Spot', logo: 'https://cdn-icons-png.flaticon.com/512/2912/2912761.png' },
        // ... (Repeat for 50 items)
    ];

    async function handleTrade(side) {
        const amount = parseFloat(document.getElementById('tradeQty').value);
        if(!amount || amount > userBalance) return alert("Invalid Amount/Balance");

        const orderNo = "TXN-" + Math.floor(Math.random() * 900000 + 100000);
        const buyPrice = (Math.random() * 450).toFixed(2);
        
        const entry = {
            type: 'TRADE',
            side: side,
            symbol: currentAsset,
            orderNo: orderNo,
            purchaseTime: new Date().toLocaleString(),
            buyPrice: buyPrice,
            sellPrice: side === 'SELL' ? (buyPrice * 1.05).toFixed(2) : "Position Open",
            qty: (amount / buyPrice).toFixed(4),
            fee: (amount * 0.001).toFixed(2),
            return: side === 'SELL' ? "5.00%" : "---",
            profit: side === 'SELL' ? (amount * 0.05).toFixed(2) : "---",
            status: side === 'BUY' ? 'Active' : 'Closed'
        };

        saveToLedger(entry);
        await updateBalance(-amount);
        alert(`${side} Order executed successfully.`);
        closeModals();
        sync();
    }

    function saveToLedger(entry) {
        let ledger = JSON.parse(localStorage.getItem(`ledger_${email}`)) || [];
        ledger.unshift(entry);
        localStorage.setItem(`ledger_${email}`, JSON.stringify(ledger));
        renderLedger();
    }

    function renderLedger() {
        const container = document.getElementById('ledger-list');
        const ledger = JSON.parse(localStorage.getItem(`ledger_${email}`)) || [];
        
        container.innerHTML = ledger.map(t => `
            <div class="history-card" style="border-left-color: ${t.type === 'TRADE' ? 'var(--t-red)' : 'var(--success)'}">
                <div class="hc-type">${t.type} | ${t.symbol || 'System'}</div>
                <div class="hc-row"><span class="hc-label">Order No</span><span class="hc-val">${t.orderNo}</span></div>
                <div class="hc-row"><span class="hc-label">Time</span><span class="hc-val">${t.purchaseTime}</span></div>
                <div class="hc-row"><span class="hc-label">Buy Price</span><span class="hc-val">$${t.buyPrice}</span></div>
                ${t.status === 'Closed' ? `<div class="hc-row"><span class="hc-label">Sell Price</span><span class="hc-val">$${t.sellPrice}</span></div>` : ''}
                <div class="hc-row"><span class="hc-label">Quantity</span><span class="hc-val">${t.qty}</span></div>
                <div class="hc-row"><span class="hc-label">Fee</span><span class="hc-val">$${t.fee}</span></div>
                <div class="hc-row"><span class="hc-label">Profit</span><span class="hc-val" style="color:var(--success)">$${t.profit}</span></div>
            </div>
        `).join('');
    }

    // Include the sync(), nav(), and renderAssets() from your previous code...
    window.onload = () => { sync(); renderAssets(); renderLedger(); };
</script>
</body>
</html>
