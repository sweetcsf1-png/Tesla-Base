<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tesla Base | Master Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #000;
            --tesla-red: #E31937;
            --card-bg: #121212;
            --text-main: #ffffff;
            --text-gray: #888888;
            --border: #222222;
            --success: #00ff88;
            --danger: #ff3b3b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            padding-bottom: 90px; /* Space for Nav */
            overflow-x: hidden;
        }

        /* Top Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 20px;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-weight: 900;
            color: var(--tesla-red);
            letter-spacing: 3px;
            font-size: 18px;
            text-transform: uppercase;
        }

        /* Portfolio Balance Card */
        .balance-card {
            padding: 35px 20px;
            background: linear-gradient(180deg, #111111 0%, #000000 100%);
            border-bottom: 10px solid #080808;
            text-align: left;
        }

        .balance-label {
            color: var(--text-gray);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .balance-amount {
            font-size: 42px;
            font-weight: 800;
            letter-spacing: -1px;
            margin: 5px 0;
        }

        .btc-calculator {
            color: var(--tesla-red);
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            font-weight: bold;
            margin-top: 4px;
        }

        /* Tab Navigation */
        .tabs {
            display: flex;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 65px;
            z-index: 999;
        }

        .tab {
            flex: 1;
            padding: 16px;
            text-align: center;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-gray);
            cursor: pointer;
            transition: 0.3s;
        }

        .tab.active {
            color: var(--tesla-red);
            border-bottom: 2px solid var(--tesla-red);
        }

        /* Asset List Styling */
        .asset-container {
            padding: 0;
        }

        .search-wrapper {
            padding: 15px 20px;
            background: var(--bg);
        }

        .search-bar {
            width: 100%;
            background: #111;
            border: 1px solid #333;
            padding: 14px 15px;
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            outline: none;
        }

        .asset-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 20px;
            border-bottom: 1px solid var(--border);
            transition: background 0.2s;
        }

        .asset-row:active {
            background: #111;
        }

        .asset-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .asset-icon {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: #222;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: var(--tesla-red);
        }

        .asset-name-wrapper b {
            display: block;
            font-size: 16px;
            letter-spacing: 0.5px;
        }

        .asset-name-wrapper small {
            color: var(--text-gray);
            font-size: 12px;
        }

        .asset-price-wrapper {
            text-align: right;
        }

        .price-text {
            font-weight: 700;
            font-size: 16px;
        }

        .change-text {
            font-size: 12px;
            font-weight: 600;
        }

        .up { color: var(--success); }
        .down { color: var(--danger); }

        /* Investment Plan Cards */
        .plan-wrapper {
            padding: 20px;
            display: none; /* Hidden by default, toggled via JS */
        }

        .plan-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            border-left: 6px solid var(--tesla-red);
            position: relative;
            overflow: hidden;
        }

        .plan-card h3 {
            margin: 0 0 10px 0;
            font-size: 20px;
            color: var(--text-main);
        }

        .plan-stats {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #222;
        }

        .stat-box small {
            display: block;
            color: var(--text-gray);
            font-size: 11px;
            margin-bottom: 4px;
        }

        .stat-box b {
            font-size: 15px;
            color: var(--success);
        }

        .invest-btn {
            width: 100%;
            background: var(--tesla-red);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-weight: 800;
            margin-top: 20px;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* Bottom Navbar */
        .nav-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(0,0,0,0.95);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            z-index: 1001;
        }

        .nav-item {
            text-align: center;
            color: var(--text-gray);
            text-decoration: none;
            font-size: 10px;
            font-weight: 600;
            transition: 0.3s;
        }

        .nav-item i {
            font-size: 22px;
            margin-bottom: 4px;
            display: block;
        }

        .nav-item.active {
            color: var(--tesla-red);
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">Tesla Base</div>
        <div class="user-actions">
            <i class="fa-solid fa-bell" style="font-size: 20px; margin-right: 15px;"></i>
            <i class="fa-solid fa-circle-user" style="font-size: 24px; color: var(--tesla-red);"></i>
        </div>
    </header>

    <section class="balance-card">
        <div class="balance-label">Total Injected Assets</div>
        <div class="balance-amount" id="usd-balance">$0.00</div>
        <div class="btc-calculator" id="btc-balance">0.00000000 BTC</div>
    </section>

    <nav class="tabs">
        <div class="tab active" id="tab-market" onclick="switchPage('market')">MARKET</div>
        <div class="tab" id="tab-invest" onclick="switchPage('invest')">TESLA GROW</div>
    </nav>

    <main id="page-market">
        <div class="search-wrapper">

                <nav class="nav-bar">
        <a href="#" class="nav-item active" onclick="switchPage('market')">
            <i class="fa-solid fa-chart-line"></i>Home
        </a>
        <a href="#" class="nav-item">
            <i class="fa-solid fa-wallet"></i>Wallet
        </a>
        <a href="#" class="nav-item">
            <i class="fa-solid fa-arrow-right-arrow-left"></i>Swap
        </a>
        <a href="#" class="nav-item" onclick="switchPage('invest')">
            <i class="fa-solid fa-bolt"></i>Grow
        </a>
    </nav>

    <script>
        // --- 1. GLOBAL STATE ---
        let btcPrice = 69000; // Default fallback
        const email = localStorage.getItem('userEmail');
        
        // 200+ Assets Generator
        const assetBase = [
            {s: 'BTC', n: 'Bitcoin', p: 69392},
            {s: 'ETH', n: 'Ethereum', p: 3510},
            {s: 'TSLA', n: 'Tesla Inc', p: 202.45},
            {s: 'SOL', n: 'Solana', p: 145.20},
            {s: 'XRP', n: 'Ripple', p: 0.62}
        ];

        // Generate the remaining 195+ assets automatically
        for (let i = 1; i <= 200; i++) {
            assetBase.push({
                s: 'AST' + i,
                n: 'Global Asset ' + i,
                p: (Math.random() * 150).toFixed(2)
            });
        }

        // --- 2. INITIALIZATION ---
        async function init() {
            if (!email) {
                window.location.href = 'index.html'; // Redirect if no persistent login
                return;
            }
            await fetchBtcPrice();
            await syncUserData();
            renderAssets();
            // Refresh balance every 10 seconds for accuracy
            setInterval(syncUserData, 10000);
        }

        // Fetch Live BTC Price for the calculator
        async function fetchBtcPrice() {
            try {
                const res = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT');
                const data = await res.json();
                btcPrice = parseFloat(data.price);
            } catch (e) { console.error("Price feed failed, using fallback."); }
        }

        // --- 3. CORE LOGIC ---
        async function syncUserData() {
            try {
                const res = await fetch(`/api/user/data?email=${email}`);
                const user = await res.json();
                
                if (user && user.balance !== undefined) {
                    const bal = parseFloat(user.balance);
                    document.getElementById('usd-balance').innerText = `$${bal.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
                    document.getElementById('btc-balance').innerText = (bal / btcPrice).toFixed(8) + " BTC";
                }
            } catch (err) { console.error("Sync failed"); }
        }

        function renderAssets() {
            const list = document.getElementById('asset-list');
            const search = document.getElementById('asset-search').value.toUpperCase();
            
            list.innerHTML = assetBase
                .filter(a => a.s.includes(search) || a.n.toUpperCase().includes(search))
                .map(a => `
                    <div class="asset-row">
                        <div class="asset-info">
                            <div class="asset-icon">${a.s.charAt(0)}</div>
                            <div class="asset-name-wrapper">
                                <b>${a.s}</b>
                                <small>${a.n}</small>
                            </div>
                        </div>
                        <div class="asset-price-wrapper">
                            <div class="price-text">$${parseFloat(a.p).toLocaleString()}</div>
                            <div class="change-text ${Math.random() > 0.4 ? 'up' : 'down'}">
                                ${Math.random() > 0.4 ? '+' : '-'}${(Math.random() * 5).toFixed(2)}%
                            </div>
                        </div>
                    </div>
                `).join('');
        }

        function switchPage(page) {
            document.getElementById('page-market').style.display = page === 'market' ? 'block' : 'none';
            document.getElementById('page-invest').style.display = page === 'invest' ? 'block' : 'none';
            
            document.getElementById('tab-market').classList.toggle('active', page === 'market');
            document.getElementById('tab-invest').classList.toggle('active', page === 'invest');
        }

        function processInvest(amount) {
            alert("Confirming investment of $" + amount + ". Funds will be locked for the selected duration.");
            // Logic for growth plans can be expanded here
        }

        function filterAssets() { renderAssets(); }

        window.onload = init;
    </script>
</body>
        </html>
