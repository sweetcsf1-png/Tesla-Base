<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Base | Dashboard</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid #222; }
        .logo { color: #E31937; font-weight: 900; letter-spacing: 3px; }
        
        .balance-card { background: linear-gradient(145deg, #111, #050505); padding: 40px; border-radius: 20px; border: 1px solid #E31937; text-align: center; margin: 30px 0; }
        .balance-label { color: #888; text-transform: uppercase; font-size: 12px; letter-spacing: 2px; }
        .balance-amount { font-size: 48px; font-weight: bold; margin: 10px 0; color: #fff; }

        .deposit-section { background: #111; padding: 25px; border-radius: 15px; border: 1px solid #222; }
        h3 { color: #E31937; margin-top: 0; }
        .wallet-display { background: #000; padding: 15px; border-radius: 8px; border: 1px dashed #444; word-break: break-all; font-family: monospace; margin: 15px 0; color: #00ff00; }
        
        .btn-logout { background: transparent; border: 1px solid #444; color: #888; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .btn-logout:hover { color: #fff; border-color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo">TESLA BASE</div>
        <button class="btn-logout" onclick="logout()">LOGOUT</button>
    </div>

    <div class="balance-card">
        <div class="balance-label">Available Portfolio Balance</div>
        <div class="balance-amount" id="userBalance">$0.00</div>
        <div style="font-size: 14px; color: #666;">Account: <span id="userEmailDisplay">...</span></div>
    </div>

    <div class="deposit-section">
        <h3>Deposit Funds</h3>
        <p style="font-size: 14px; color: #888;">Send Bitcoin to the address below to fund your account. Assets are protected and never expire.</p>
        
        <div class="balance-label" style="margin-top:20px;">Official Deposit Address:</div>
        <div class="wallet-display" id="adminBtcAddress">Loading official address...</div>
        
        <div class="balance-label" style="margin-top:20px;">Your Personal Tesla ID:</div>
        <div class="wallet-display" id="userTeslaWallet" style="color: #aaa;">Generating...</div>
    </div>
</div>

<script>
    const api = window.location.origin;
    const userEmail = localStorage.getItem('userEmail');

    // Security Check: If not logged in, send to login page
    if (!userEmail) {
        window.location.href = '/';
    }

    document.getElementById('userEmailDisplay').innerText = userEmail;

    async function loadDashboardData() {
        try {
            // 1. Fetch User Balance and personal Wallet
            const userRes = await fetch(`${api}/api/user/data?email=${userEmail}`);
            const userData = await userRes.json();
            
            if (userRes.ok) {
                document.getElementById('userBalance').innerText = `$${parseFloat(userData.balance).toLocaleString()}`;
                document.getElementById('userTeslaWallet').innerText = userData.wallet_address;
            }

            // 2. Fetch the Official Bitcoin Address (set by Admin)
            const walletRes = await fetch(`${api}/api/site/wallet`);
            const walletData = await walletRes.json();
            
            if (walletRes.ok) {
                document.getElementById('adminBtcAddress').innerText = walletData.address;
            }

        } catch (e) {
            console.error("Error loading dashboard data");
        }
    }

    function logout() {
        localStorage.removeItem('userEmail');
        window.location.href = '/';
    }

    // Load data immediately
    loadDashboardData();
    // Refresh data every 30 seconds to show balance updates from admin
    setInterval(loadDashboardData, 30000);
</script>

</body>
</html>
