<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tesla Base | Support</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="display:flex; flex-direction:column; height:100vh;">
    <header style="padding:15px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px;">
        <i class="fa-solid fa-chevron-left" onclick="history.back()"></i>
        <div style="font-weight:bold;">24/7 Live Support</div>
    </header>

    <div id="chat-box" style="flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:10px;">
        <div style="background:var(--card); padding:10px; border-radius:8px; align-self:flex-start; max-width:80%;">
            Hello! How can we help you today?
        </div>
        </div>

    <div style="padding:15px; border-top:1px solid var(--border); display:flex; gap:10px;">
        <input type="text" id="msg-input" placeholder="Type a message..." style="margin:0;">
        <button onclick="sendToAdmin()" class="primary-btn" style="width:80px; padding:10px;">Send</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
    <script>
        async function sendToAdmin() {
            const text = document.getElementById('msg-input').value;
            const { data: { user } } = await _supabase.auth.getUser();
            
            await _supabase.from('messages').insert([{ 
                sender_id: user.id, 
                text: text, 
                is_admin_reply: false 
            }]);
            document.getElementById('msg-input').value = '';
            loadChat();
        }

        async function loadChat() {
            const { data: { user } } = await _supabase.auth.getUser();
            const { data: msgs } = await _supabase.from('messages')
                .select('*')
                .or(`sender_id.eq.${user.id},receiver_id.eq.${user.id}`)
                .order('created_at', {ascending: true});
            
            const box = document.getElementById('chat-box');
            box.innerHTML = '';
            msgs.forEach(m => {
                const isMe = !m.is_admin_reply;
                box.innerHTML += `
                <div style="background:${isMe ? 'var(--accent)' : 'var(--card)'}; 
                            padding:10px; border-radius:8px; 
                            align-self:${isMe ? 'flex-end' : 'flex-start'}; max-width:80%;">
                    ${m.text}
                </div>`;
            });
            box.scrollTop = box.scrollHeight;
        }
        setInterval(loadChat, 3000); // Auto-refresh every 3 seconds
    </script>
</body>
</html>
