<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Base | Authentication</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-card { background: #111; padding: 40px; border-radius: 12px; width: 350px; text-align: center; border: 1px solid #222; }
        input { width: 100%; padding: 14px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 14px; background: #E31937; border: none; color: #fff; font-weight: bold; border-radius: 8px; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .error { color: #ff3b3b; font-size: 13px; margin-top: 15px; display: none; }
        .logo { color: #E31937; font-size: 24px; font-weight: 900; letter-spacing: 4px; margin-bottom: 30px; }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="logo">TESLA BASE</div>
        <h3 id="title">Login</h3>
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="password" placeholder="Password">
        <button id="btn" onclick="handleAuth()">Login</button>
        <p id="error" class="error"></p>
        <p style="font-size: 14px; color: #888; margin-top: 25px;">
            <span id="mode-text">New to Tesla Base?</span> 
            <span style="color:#E31937; cursor:pointer; font-weight:bold;" onclick="toggle()">Create Account</span>
        </p>
    </div>

    <script>
        let isLogin = true;
        // Persistence: No sign out until explicit logout
        if (localStorage.getItem('userEmail')) window.location.href = 'dashboard.html';

        function toggle() {
            isLogin = !isLogin;
            document.getElementById('title').innerText = isLogin ? 'Login' : 'Register';
            document.getElementById('btn').innerText = isLogin ? 'Login' : 'Create Account';
            document.getElementById('mode-text').innerText = isLogin ? 'New to Tesla Base?' : 'Already have an account?';
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            // IMPORTANT: Point directly to your Render URL
            const baseUrl = "https://tesla-base.onrender.com";
            const path = isLogin ? '/api/auth/login' : '/api/auth/register';

            try {
                const res = await fetch(baseUrl + path, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('userEmail', email);
                    window.location.href = 'dashboard.html';
                } else {
                    showError(data.error);
                }
            } catch (e) {
                showError("Connection error. Check Render Logs.");
            }
        }

        function showError(msg) {
            const err = document.getElementById('error');
            err.innerText = msg;
            err.style.display = 'block';
        }
    </script>
</body>
</html>
