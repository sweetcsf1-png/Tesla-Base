<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Base | Secure Login</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #111; padding: 40px; border-radius: 15px; width: 360px; text-align: center; border: 1px solid #222; }
        .logo { color: #E31937; font-size: 28px; font-weight: 900; letter-spacing: 5px; margin-bottom: 30px; }
        input { width: 100%; padding: 15px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #E31937; border: none; color: #fff; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 10px; }
        .switch { font-size: 14px; color: #888; margin-top: 20px; cursor: pointer; }
        .error { color: #ff3b3b; font-size: 13px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo">TESLA BASE</div>
    <h3 id="formTitle">LOGIN</h3>
    <input type="email" id="email" placeholder="Email Address">
    <input type="password" id="password" placeholder="Password">
    <button onclick="handleSubmit()" id="submitBtn">LOG IN</button>
    <p id="error" class="error"></p>
    <p class="switch" onclick="toggleMode()" id="toggleText">New to Tesla Base? Create Account</p>
</div>

<script>
    let isLogin = true;
    const api = window.location.origin;

    // Persist Login Rule: Don't sign out until explicit logout
    if (localStorage.getItem('userEmail')) window.location.href = '/dashboard';

    function toggleMode() {
        isLogin = !isLogin;
        document.getElementById('formTitle').innerText = isLogin ? 'LOGIN' : 'REGISTER';
        document.getElementById('submitBtn').innerText = isLogin ? 'LOG IN' : 'CREATE ACCOUNT';
        document.getElementById('toggleText').innerText = isLogin ? 'New to Tesla Base? Create Account' : 'Already have an account? Log In';
    }

    async function handleSubmit() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const path = isLogin ? '/api/auth/login' : '/api/auth/register';

        try {
            const res = await fetch(api + path, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            if (res.ok) {
                localStorage.setItem('userEmail', email);
                window.location.href = '/dashboard';
            } else {
                const err = document.getElementById('error');
                err.innerText = data.error;
                err.style.display = 'block';
            }
        } catch (e) { alert("Server Connection Error"); }
    }
</script>
</body>
</html>
