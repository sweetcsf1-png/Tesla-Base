<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OKX | Trade</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://s3.tradingview.com/tv.js"></script>
</head>
<body>
    <div id="tv_chart" style="height:350px;"></div>
    <div style="display:flex; padding:15px; gap:10px;">
        <div style="flex:0.4; font-size:12px;">
            <div style="color:var(--okx-red);">67,420.5 <span style="float:right;">0.12</span></div>
            <div style="color:var(--okx-green);">67,419.0 <span style="float:right;">1.05</span></div>
        </div>
        <div style="flex:0.6;">
            <input type="number" id="trade-amt" placeholder="Amount to Trade">
            <button class="primary-btn" style="background:var(--okx-green);" onclick="executeTrade('Buy')">Buy BTC</button>
            <button class="primary-btn" style="background:var(--okx-red); margin-top:5px;" onclick="executeTrade('Sell')">Sell BTC</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item">Home</a>
        <a href="trading.html" class="nav-item active">Trade</a>
        <a href="investment.html" class="nav-item">Earn</a>
        <a href="history.html" class="nav-item">History</a>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
    <script>
        async function executeTrade(side) {
            const amt = parseFloat(document.getElementById('trade-amt').value);
            const { data: { user } } = await _supabase.auth.getUser();
            const { data: prof } = await _supabase.from('profiles').select('balance').eq('id', user.id).single();

            if (prof.balance < amt) return alert("Insufficient Balance");

            const newBal = prof.balance - amt;
            await _supabase.from('profiles').update({ balance: newBal }).eq('id', user.id);
            await _supabase.from('history').insert([{ user_id: user.id, amount: amt, type: `Trade: ${side}`, status: 'Success' }]);
            
            alert(`Trade ${side} Opened!`);
            location.reload();
        }
        window.onload = () => { new TradingView.widget({"autosize":true,"symbol":"BINANCE:BTCUSDT","theme":"dark","container_id":"tv_chart","hide_top_toolbar":true}); };
    </script>
</body>
</html>
