<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin | Support Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="display:flex; height:100vh; background:#000;">
    <div style="width:300px; border-right:1px solid var(--border); overflow-y:auto; padding:10px;">
        <h3>Active Chats</h3>
        <div id="user-list"></div>
    </div>

    <div style="flex:1; display:flex; flex-direction:column;">
        <div id="active-user-header" style="padding:15px; border-bottom:1px solid var(--border); font-weight:bold;">
            Select a user to chat
        </div>
        <div id="admin-chat-box" style="flex:1; padding:20px; overflow-y:auto; display:flex; flex-direction:column; gap:10px;"></div>
        
        <div id="reply-area" style="padding:15px; border-top:1px solid var(--border); display:none; gap:10px;">
            <input type="text" id="admin-reply-input" placeholder="Type reply...">
            <button onclick="sendReply()" class="primary-btn" style="width:100px;">Reply</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
    <script>
        let selectedUserId = null;

        async function loadUserList() {
            // Get unique users who have sent messages
            const { data } = await _supabase.from('messages').select('sender_id').eq('is_admin_reply', false);
            const uniqueUsers = [...new Set(data.map(m => m.sender_id))];
            
            const list = document.getElementById('user-list');
            list.innerHTML = '';
            uniqueUsers.forEach(uid => {
                list.innerHTML += `<div onclick="selectUser('${uid}')" style="padding:15px; cursor:pointer; border-bottom:1px solid #222;">User: ${uid.substring(0,8)}...</div>`;
            });
        }

        async function selectUser(uid) {
            selectedUserId = uid;
            document.getElementById('active-user-header').innerText = `Chatting with: ${uid}`;
            document.getElementById('reply-area').style.display = 'flex';
            loadAdminChat();
        }

        async function loadAdminChat() {
            if(!selectedUserId) return;
            const { data: msgs } = await _supabase.from('messages')
                .select('*')
                .or(`sender_id.eq.${selectedUserId},receiver_id.eq.${selectedUserId}`)
                .order('created_at', {ascending: true});
            
            const box = document.getElementById('admin-chat-box');
            box.innerHTML = '';
            msgs.forEach(m => {
                const isAdmin = m.is_admin_reply;
                box.innerHTML += `
                <div style="background:${isAdmin ? 'var(--accent)' : '#333'}; 
                            padding:10px; border-radius:8px; 
                            align-self:${isAdmin ? 'flex-end' : 'flex-start'}; max-width:80%;">
                    ${m.text}
                </div>`;
            });
        }

        async function sendReply() {
            const text = document.getElementById('admin-reply-input').value;
            await _supabase.from('messages').insert([{ 
                receiver_id: selectedUserId, 
                text: text, 
                is_admin_reply: true 
            }]);
            document.getElementById('admin-reply-input').value = '';
            loadAdminChat();
        }

        setInterval(() => { loadUserList(); loadAdminChat(); }, 3000);
    </script>
</body>
</html>
