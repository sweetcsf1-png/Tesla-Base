<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OKX | History</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h3 style="padding:20px;">Transactions</h3>
    <div id="history-inject"></div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item">Home</a>
        <a href="trading.html" class="nav-item">Trade</a>
        <a href="investment.html" class="nav-item">Earn</a>
        <a href="history.html" class="nav-item active">History</a>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
    <script>
        async function loadHistory() {
            const { data: { user } } = await _supabase.auth.getUser();
            const { data } = await _supabase.from('history').select('*').eq('user_id', user.id).order('created_at', {ascending: false});
            const cont = document.getElementById('history-inject');
            data.forEach(h => {
                cont.innerHTML += `
                <div class="history-item">
                    <div>
                        <div class="hist-blue">${h.type}</div>
                        <div style="font-size:12px; color:#848e9c;">${new Date(h.created_at).toLocaleString()}</div>
                    </div>
                    <div style="text-align:right;">
                        <div class="hist-blue">$${h.amount.toLocaleString()}</div>
                        <div style="font-size:12px; color:#00c087;">${h.status}</div>
                    </div>
                </div>`;
            });
        }
        window.onload = loadHistory;
    </script>
</body>
</html>
